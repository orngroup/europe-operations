<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#f4f5f8; --panel:#ffffff; --panel2:#f2f4f7; --line:#e6e9ef; --line2:#d5dae3;
  --text:#1d2433; --muted:#5f6880; --faint:#9aa2b5;
  --gold:#a9801e; --gold-dim:#c9a94f; --gold-bg:rgba(169,128,30,.08);
  --cyan:#0092c8; --green:#4aa845; --red:#d92d0e;
  --ok:#2c9e51; --warn:#c4890c; --danger:#cc3a24;
  --shadow:0 1px 3px rgba(20,26,40,.07), 0 4px 14px rgba(20,26,40,.05);
}
[data-theme="dark"]{
  --bg:#0b0d12; --panel:#12151d; --panel2:#181c26; --line:#242a38; --line2:#2f3748;
  --text:#e8eaf0; --muted:#8b93a7; --faint:#5b6376;
  --gold:#d4af5f; --gold-dim:#9c8140; --gold-bg:rgba(212,175,95,.08);
  --ok:#4fbf6b; --warn:#f0b429; --danger:#e6533c; --shadow:none;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;background:var(--panel);border:1px solid var(--line2);color:var(--text);border-radius:8px;padding:8px 10px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
::placeholder{color:var(--faint)}
.btn{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-weight:700;font-size:13.5px}
[data-theme="dark"] .btn{color:#14110a}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line2);font-weight:600}
.btn.ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn.small{padding:6px 12px;font-size:12.5px}
.btn.danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}
.err{color:var(--danger);font-size:12.5px;min-height:16px}
.hint{color:var(--faint);font-size:11.5px;margin-top:4px}
.fld{margin-bottom:10px}
.fld label,.field-grid label{display:block;font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:4px}
.field-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.flex-between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.empty{color:var(--faint);font-size:13px;text-align:center;padding:26px 0}
.tbl-scroll{overflow-x:auto}
.section-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:18px 0 8px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
.card h3{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:12px}
.stat-list{display:flex;flex-direction:column;gap:8px}
.badge{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid;color:var(--faint);border-color:var(--line2)}
.chip{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.chip.svc{background:var(--panel2);color:var(--muted);border:1px solid var(--line2);font-weight:600}
.chip.Contracted{background:rgba(44,158,81,.13);color:var(--ok)}
.chip.InProgress{background:rgba(196,137,12,.13);color:var(--warn)}
.chip.NotActioned{background:rgba(154,162,181,.18);color:var(--faint)}
.chip.Declined{background:rgba(204,58,36,.12);color:var(--danger)}
.pw-cell{font-family:monospace;letter-spacing:1px}
.var-pos{color:var(--ok);font-weight:700}
.var-neg{color:var(--danger);font-weight:700}

/* Login */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:flex-start;flex-direction:column;gap:26px;background-color:#0b0d12;background-size:cover;background-position:center right;position:relative;padding-left:clamp(20px,6vw,110px)}
#loginView::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg, rgba(10,12,18,.72) 0%, rgba(10,12,18,.45) 34%, rgba(10,12,18,0) 62%)}
#loginView > *{position:relative;z-index:1}
#loginView{justify-content:center;align-items:flex-start}
#loginBrand{color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.55)}
.login-card{background:rgba(255,255,255,.94);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.5);border-radius:16px;padding:34px 38px;width:min(400px,92vw);display:flex;flex-direction:column;gap:14px;box-shadow:0 12px 40px rgba(5,8,14,.45)}
.login-card,.login-card h1{color:#1d2433}
.login-card h1{font-size:20px;font-weight:700}
.login-card .sub{color:#5f6880;font-size:12.5px;margin-top:-8px}
.login-card input{background:#fff;border-color:#d5dae3;color:#1d2433}
@media(max-width:760px){#loginView{padding:0 16px;align-items:center}#loginView::before{background:rgba(10,12,18,.55)}}

/* App */
#appView{display:none;min-height:100vh}
header.topbar{position:sticky;top:0;z-index:50;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:12px 24px;flex-wrap:wrap}
.brand .t{font-weight:800;font-size:15px;letter-spacing:3px}
.brand .t small{display:block;font-weight:600;color:var(--gold);font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase}
.topnav{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.topnav button{background:transparent;border:none;color:var(--muted);padding:8px 14px;border-radius:8px;font-weight:600;font-size:13px}
.topnav button:hover{color:var(--text)}
.topnav button.active{background:var(--gold-bg);color:var(--gold)}
.userbox{display:flex;align-items:center;gap:9px;color:var(--muted);font-size:12.5px}
.userbox .avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}
[data-theme="dark"] .userbox .avatar{color:#14110a}
.sync-pill{font-size:10px;letter-spacing:.8px;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid var(--line2);color:var(--muted)}
.sync-pill.live{border-color:var(--ok);color:var(--ok)}
main{padding:26px;max-width:1500px;margin:0 auto}
.view{display:none}
.view.active{display:block}
h2.vtitle{font-size:17px;font-weight:700;margin-bottom:4px}
.vsub{color:var(--muted);font-size:12.5px;margin-bottom:18px}

/* Home tiles */
.hero{margin:18px 0 26px}
.hero h1{font-size:26px;font-weight:800}
.hero p{color:var(--muted);margin-top:4px}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px 24px;cursor:pointer;box-shadow:var(--shadow);transition:transform .14s,border-color .14s;border-top:4px solid var(--gold)}
.tile:hover{transform:translateY(-3px);border-color:var(--gold)}
.tile .ic{font-size:26px;margin-bottom:12px}
.tile h3{font-size:16px;font-weight:800;margin-bottom:6px}
.tile p{color:var(--muted);font-size:12.5px}
.tile .cnt{margin-top:12px;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--gold);font-weight:700}
.tile.soon{opacity:.65;border-top-color:var(--line2)}
.tile.soon:hover{transform:none;border-color:var(--line)}

/* Tables */
table.bk{width:100%;border-collapse:collapse;background:var(--panel);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
table.bk th{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);text-align:left;padding:10px;border-bottom:1px solid var(--line2);font-weight:700;background:var(--panel2)}
table.bk td{padding:9px 10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
table.bk tbody tr:last-child td{border-bottom:none}
table.bk td input, table.bk td select{background:transparent;border-color:transparent;padding:4px 6px}
table.bk td input:hover, table.bk td select:hover{border-color:var(--line2)}
table.bk td input:focus, table.bk td select:focus{border-color:var(--gold);background:var(--panel)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.toolbar input[type=search]{max-width:300px}
.toolbar select{width:auto;min-width:130px}
.subtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.subtabs button{background:var(--panel);border:1px solid var(--line2);color:var(--muted);padding:8px 16px;border-radius:20px;font-weight:600;font-size:12.5px}
.subtabs button.active{background:var(--gold);border-color:var(--gold);color:#fff}
[data-theme="dark"] .subtabs button.active{color:#14110a}
.flagbox{display:inline-flex;gap:8px;align-items:center;font-size:11px;color:var(--muted)}
.flagbox label{display:flex;gap:3px;align-items:center;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;font-weight:700;font-size:9.5px}
.flagbox input{width:auto}

/* Modal */
.modal-back{display:none;position:fixed;inset:0;background:rgba(18,22,32,.55);z-index:100;overflow-y:auto;padding:30px 14px}
.modal-back.open{display:block}
.modal{background:var(--panel);border:1px solid var(--line2);border-radius:16px;max-width:1000px;margin:0 auto;padding:24px 26px;box-shadow:var(--shadow)}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.modal-head h2{font-size:18px;font-weight:800}
.modal-head .meta{color:var(--muted);font-size:12.5px;margin-top:3px}
.close-x{background:transparent;border:1px solid var(--line2);color:var(--muted);border-radius:8px;width:32px;height:32px;font-size:15px}
.close-x:hover{color:var(--text);border-color:var(--gold)}
@media(max-width:820px){main{padding:16px}}
</style>
</head>

<div id="loginView">
  <div id="loginBrand" style="text-align:left">
    <div style="font-weight:800;font-size:34px;letter-spacing:8px">ORN</div>
    <div style="font-size:12px;letter-spacing:2.5px;text-transform:uppercase;opacity:.85;margin-top:2px">Europe</div>
  </div>
  <div class="login-card">
    <h1>Europe Sales &amp; Operations Hub</h1>
    <div class="fld"><label>User</label><select id="loginUser"></select></div>
    <div class="fld"><label>Password</label><input id="loginPass" type="password" autocomplete="current-password"></div>
    <div class="err" id="loginErr"></div>
    <button class="btn" onclick="doLogin()">Sign in</button>
    <div style="text-align:center;font-size:12px;color:#5f6880">TAG USA / Australia teams: <a href="./support/" style="color:#a9801e;font-weight:700">submit a support request →</a></div>
  </div>
</div>

<div id="appView">
  <header class="topbar">
    <div class="brand"><div class="t">ORN <small>Europe · Main Hub</small></div></div>
    <nav class="topnav">
      <button data-view="home" class="active" onclick="switchView('home')">Home</button>
      <button data-view="contracting" onclick="switchView('contracting')">Contracting</button>
      <button data-view="directory" onclick="switchView('directory')">Supplier Directory</button>
    </nav>
    <div class="userbox">
      <span class="sync-pill" id="syncPill">Local</span>
      <div class="avatar" id="userAvatar">--</div>
      <span id="userName"></span>
      <button class="btn ghost small" id="themeBtn" onclick="toggleTheme()">Dark mode</button>
      <button class="btn ghost small" onclick="doLogout()">Sign out</button>
    </div>
  </header>
  <main>
    <div class="view active" id="view-home"></div>
    <div class="view" id="view-contracting"></div>
    <div class="view" id="view-directory"></div>
  </main>
</div>

<div class="modal-back" id="modalBack" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

/* ================= STATE & PERSISTENCE ================= */
let DB=null, FIRE=false;
let state = { user:null, users:[], directory:[], hotels:[], chains:[], outreach:[] };

function lsGet(k,d){ try{ const v=localStorage.getItem('ornhub_'+k); return v?JSON.parse(v):d; }catch(e){ return d; } }
function lsSet(k,v){ localStorage.setItem('ornhub_'+k, JSON.stringify(v)); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function initPersistence(){
  if (FIREBASE_CONFIG.apiKey && typeof firebase !== 'undefined' && firebase && firebase.initializeApp){
    try{
      firebase.initializeApp(FIREBASE_CONFIG);
      DB = firebase.firestore(); FIRE = true;
      document.getElementById('syncPill').textContent='Live · Firebase';
      document.getElementById('syncPill').classList.add('live');
      subscribe();
    }catch(e){ console.error(e); FIRE=false; loadLocal(); }
  } else {
    const pill = document.getElementById('syncPill');
    if (FIREBASE_CONFIG.apiKey && pill){ pill.textContent='Offline · retry?'; pill.style.cursor='pointer'; pill.onclick=()=>location.reload(); }
    loadLocal();
  }
}
function loadLocal(){
  state.users = lsGet('users', null) || DEFAULT_USERS.slice();
  mergeDefaultUsers();
  populateLoginUsers();
  state.directory = lsGet('directory', null) || SEED_DIRECTORY.map((r,i)=>({...r, id:r.id||('dir'+i)}));
  state.hotels = lsGet('hotels', null) || (SEED_CONTRACTING.hotels||[]).map((r,i)=>({id:'ht'+i, ...r}));
  state.chains = lsGet('chains', null) || (SEED_CONTRACTING.chains||[]).map((r,i)=>({id:'ch'+i, ...r}));
  state.outreach = lsGet('outreach', null) || (SEED_CONTRACTING.outreach||[]).map((r,i)=>({id:'or'+i, ...r}));
  ['directory','hotels','chains','outreach'].forEach(k=>lsSet(k, state[k]));
  renderAll();
}
function mergeDefaultUsers(){
  let changed=false;
  DEFAULT_USERS.forEach(du=>{ if (!state.users.some(u=>u.id===du.id)){ state.users.push(du); changed=true; } });
  if (changed && !FIRE) lsSet('users', state.users);
}
function subscribe(){
  DB.collection(COLL.users).onSnapshot(s=>{
    if (s.empty){ DEFAULT_USERS.forEach(u=>DB.collection(COLL.users).doc(u.id).set(u)); return; }
    state.users = s.docs.map(d=>d.data());
    mergeDefaultUsers();
    populateLoginUsers();
    if (!state.user) tryRestoreSession();
  });
  const seedMap = { directory:()=>SEED_DIRECTORY.map((r,i)=>({...r, id:r.id||('dir'+i)})),
    hotels:()=> (SEED_CONTRACTING.hotels||[]).map((r,i)=>({id:'ht'+i, ...r})),
    chains:()=> (SEED_CONTRACTING.chains||[]).map((r,i)=>({id:'ch'+i, ...r})),
    outreach:()=> (SEED_CONTRACTING.outreach||[]).map((r,i)=>({id:'or'+i, ...r})) };
  ['directory','hotels','chains','outreach'].forEach(k=>{
    DB.collection(COLL[k]).onSnapshot(s=>{
      if (s.empty && !window['__seeded_'+k]){
        window['__seeded_'+k]=true;
        seedMap[k]().forEach(r=>DB.collection(COLL[k]).doc(r.id).set(r));
        return;
      }
      state[k] = s.docs.map(d=>d.data());
      renderAll();
    });
  });
}
function saveItem(kind, item){
  if (!item.id) item.id = kind.slice(0,2)+Date.now()+Math.random().toString(36).slice(2,5);
  if (FIRE){ DB.collection(COLL[kind]).doc(item.id).set(item); }
  else {
    const i = state[kind].findIndex(x=>x.id===item.id);
    if (i>=0) state[kind][i]=item; else state[kind].push(item);
    lsSet(kind, state[kind]); renderAll();
  }
}
function deleteItem(kind, id){
  if (FIRE) DB.collection(COLL[kind]).doc(id).delete();
  else { state[kind]=state[kind].filter(x=>x.id!==id); lsSet(kind, state[kind]); renderAll(); }
}
function logActivity(ref, action){
  const e = { ts:new Date().toISOString(), user: state.user?state.user.id:'system', ref, action };
  if (FIRE) DB.collection(COLL.activity).add(e);
}

/* ================= THEME / LOGIN / NAV ================= */
function applyTheme(){
  const t = localStorage.getItem('ornhub_theme') || 'light';
  document.documentElement.setAttribute('data-theme', t==='dark'?'dark':'light');
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t==='dark'?'Light mode':'Dark mode';
}
function toggleTheme(){
  localStorage.setItem('ornhub_theme', (localStorage.getItem('ornhub_theme')||'light')==='dark'?'light':'dark');
  applyTheme();
}
function populateLoginUsers(){
  const sel = document.getElementById('loginUser');
  if (!sel || sel.tagName!=='SELECT') return;
  const users = (state.users && state.users.length? state.users : DEFAULT_USERS).slice()
    .sort((a,z)=>a.name.localeCompare(z.name));
  const cur = sel.value;
  sel.innerHTML = users.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
  if (cur && users.some(u=>u.id===cur)) sel.value = cur;
}
function doLogin(){
  const u = document.getElementById('loginUser').value.trim().toUpperCase();
  const p = document.getElementById('loginPass').value;
  const users = state.users.length? state.users : DEFAULT_USERS;
  const found = users.find(x=>x.id.toUpperCase()===u && x.pass===p);
  if (!found){ document.getElementById('loginErr').textContent='Invalid user ID or password.'; return; }
  state.user = found;
  sessionStorage.setItem('ornhub_user', JSON.stringify({id:found.id}));
  sessionStorage.setItem('orn_sso', JSON.stringify({id:found.id}));
  document.getElementById('loginView').style.display='none';
  document.getElementById('appView').style.display='block';
  document.getElementById('userAvatar').textContent = found.id;
  document.getElementById('userName').textContent = found.name;
  logActivity('-','Signed in to Europe Hub');
  renderAll();
}
function doLogout(){ sessionStorage.removeItem('ornhub_user'); sessionStorage.removeItem('orn_sso'); location.reload(); }
function tryRestoreSession(){
  if (state.user) return;
  const s = sessionStorage.getItem('ornhub_user') || sessionStorage.getItem('orn_sso');
  if (!s) return;
  const {id} = JSON.parse(s);
  const users = state.users.length? state.users : DEFAULT_USERS;
  const found = users.find(x=>x.id===id);
  if (found){
    state.user=found;
    document.getElementById('loginView').style.display='none';
    document.getElementById('appView').style.display='block';
    document.getElementById('userAvatar').textContent=found.id;
    document.getElementById('userName').textContent=found.name;
    renderAll();
  }
}

    <div class="toolbar">
      <input type="search" placeholder="Search anything — name, contact, email, notes, login…" value="${esc(f.q)}" oninput="dirFilters.q=this.value;renderDirectory()">
      <select onchange="dirFilters.cat=this.value;renderDirectory()"><option value="">All types</option>${DIR_CATS.map(c=>`<option ${f.cat===c?'selected':''}>${c}</option>`).join('')}</select>
      <input list="dirDests" placeholder="Destination / country" style="max-width:180px" value="${esc(f.dest)}" oninput="dirFilters.dest=this.value;renderDirectory()">
      <datalist id="dirDests">${dests.slice(0,300).map(x=>`<option value="${esc(x)}">`).join('')}</datalist>
      <select onchange="dirFilters.login=this.value;renderDirectory()"><option value="">Login: any</option><option value="yes" ${f.login==='yes'?'selected':''}>Has login</option><option value="no" ${f.login==='no'?'selected':''}>No login</option></select>
      <select onchange="dirFilters.src=this.value;renderDirectory()"><option value="">All sources</option>${srcs.map(s=>`<option ${f.src===s?'selected':''}>${esc(s)}</option>`).join('')}</select>
      ${(f.q||f.cat||f.dest||f.src||f.login)?`<button class="btn ghost small" onclick="dirFilters={q:'',cat:'',dest:'',src:'',login:'',sort:'name',dir:1};renderDirectory()">Clear</button>`:''}
    </div>
    <div class="tbl-scroll"><table class="bk">
      <thead><tr>
        <th style="cursor:pointer" onclick="dirSort('name')">Name${arrow('name')}</th>
        <th style="cursor:pointer" onclick="dirSort('destination')">Destination${arrow('destination')}</th>
        <th style="cursor:pointer" onclick="dirSort('category')">Type${arrow('category')}</th>
        <th>Phone</th><th>Email</th><th>Login</th><th></th>
      </tr></thead>
      <tbody>${rows.slice(0,500).map(r=>`<tr>
        <td style="min-width:170px"><b>${esc(r.name)}</b>${r.contact?`<div class="hint">${esc(r.contact)}</div>`:''}</td>
        <td style="max-width:180px">${esc((r.destination||'—').slice(0,48))}</td>
        <td><span class="chip svc">${esc(r.category)}</span></td>
        <td style="white-space:nowrap">${esc(r.phone||'—')}</td>
        <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis">${esc((r.email||'—').split(String.fromCharCode(10))[0].slice(0,44))}</td>
        <td>${(r.username||r.password)?'<span class="badge">yes</span>':'<span style="color:var(--faint)">—</span>'}</td>
        <td><button class="btn ghost small" onclick="openDirModal('${r.id}')">Open</button></td>
      </tr>`).join('') || '<tr><td colspan="7" class="empty">No suppliers match these filters.</td></tr>'}</tbody>
    </table></div>
    ${rows.length>500?'<div class="hint">Showing first 500 — narrow the filters to see the rest.</div>':''}`;
}
function dirSort(k){ if (dirFilters.sort===k) dirFilters.dir*=-1; else { dirFilters.sort=k; dirFilters.dir=1; } renderDirectory(); }
function openDirModal(id){
  const r = state.directory.find(x=>x.id===id);
  if (!r) return;
  const show = dirReveal.has(id);
  document.getElementById('modalBox').innerHTML = `
    <div class="modal-head">
      <div><h2>${esc(r.name)} <span class="chip svc">${esc(r.category)}</span></h2>
      <div class="meta">${esc(r.destination||'')} · source: ${esc(r.source||'manual')}</div></div>
      <button class="close-x" onclick="closeModal()">✕</button>
    </div>
    <div class="field-grid">
      <div><label>Name</label><input value="${esc(r.name)}" onchange="editDir('${id}','name',this.value)"></div>
      <div><label>Type</label><select onchange="editDir('${id}','category',this.value)">${DIR_CATS.map(c=>`<option ${r.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div><label>Destination / coverage</label><input value="${esc(r.destination)}" onchange="editDir('${id}','destination',this.value)"></div>
      <div><label>Contact person</label><input value="${esc(r.contact)}" onchange="editDir('${id}','contact',this.value)"></div>
    </div>
    <div class="field-grid">
      <div><label>Phone</label><input value="${esc(r.phone)}" onchange="editDir('${id}','phone',this.value)"></div>
      <div><label>Email</label><input value="${esc(r.email)}" onchange="editDir('${id}','email',this.value)"></div>
      <div><label>Website / portal URL</label><input value="${esc(r.website)}" onchange="editDir('${id}','website',this.value)"></div>
      <div><label>API / integration</label><input value="${esc(r.api)}" onchange="editDir('${id}','api',this.value)"></div>
    </div>
    <div class="section-lbl">Login &amp; commercial</div>
    <div class="field-grid">
      <div><label>Username / ID</label><input value="${esc(r.username)}" onchange="editDir('${id}','username',this.value)"></div>
      <div><label>Password</label>${show
        ? `<input class="pw-cell" value="${esc(r.password)}" onchange="editDir('${id}','password',this.value)">`
        : `<div style="display:flex;gap:8px;align-items:center"><span class="pw-cell" style="padding-top:6px">${r.password?'•••••••':'—'}</span><button class="btn ghost small" onclick="dirReveal.add('${id}');openDirModal('${id}')">Show</button></div>`}</div>
      <div><label>Account / Nexus ID</label><input value="${esc(r.account)}" onchange="editDir('${id}','account',this.value)"></div>
      <div><label>Commission</label><input value="${esc(r.commission)}" onchange="editDir('${id}','commission',this.value)"></div>
    </div>
    <div class="fld"><label>Notes</label><textarea rows="4" onchange="editDir('${id}','notes',this.value)">${esc(r.notes)}</textarea></div>
    <div class="flex-between" style="margin-top:14px">
      <button class="btn danger small" onclick="if(confirm('Delete supplier?')){deleteItem('directory','${id}');closeModal();}">Delete supplier</button>
      <button class="btn ghost small" onclick="dirReveal.delete('${id}');closeModal()">Close</button>
    </div>`;
  document.getElementById('modalBack').classList.add('open');
}
function editDir(id,f,v){ const r=state.directory.find(x=>x.id===id); if(!r)return; r[f]=v; saveItem('directory',r); logActivity('-','Supplier '+(r.name||'')+': '+f+' updated'); }
function addDirEntry(){
  const r = {name:'New supplier', category:'Activity supplier', destination:'', contact:'', phone:'', email:'', website:'', username:'', password:'', account:'', commission:'', api:'', notes:'', source:'manual'};
  saveItem('directory', r);
  logActivity('-','Supplier added to directory');
  renderDirectory();
  openDirModal(r.id);
}

/* ================= BOOT ================= */
applyTheme();
populateLoginUsers();
document.getElementById('loginPass').addEventListener('keydown', e=>{ if (e.key==='Enter') doLogin(); });
initPersistence();
if (!FIRE) tryRestoreSession(); else setTimeout(tryRestoreSession, 600);
</script>
</body>
</html>

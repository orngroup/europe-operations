// ── SESSION CHECK ────────────────────────────────────────────
(function() {
  var ts = parseInt(localStorage.getItem('ce_auth_ts') || '0');
  var TTL = 12 * 60 * 60 * 1000; // 12 hours
  if (!ts || (Date.now() - ts) > TTL) {
    // Clear session and redirect to login
    ['ce_user_id','ce_user_name','ce_user_dept','ce_user_email',
     'ce_user_admin','ce_user_price','ce_user_mgr','ce_auth_ts'].forEach(function(k){
      localStorage.removeItem(k);
    });
    window.location.replace('login.html');
  }
})();
</script>

    <button onclick="if(confirm('Sign out of CapEye?'))doLogout()" style="padding:5px 12px;background:rgba(200,16,46,.08);border:1px solid rgba(200,16,46,.2);border-radius:6px;color:#C8102E;font-size:11px;font-weight:700;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;white-space:nowrap"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    <span class="nav-user" id="nav-user">Keith Hardy</span>
  </div>
</nav>

<div class="shell">
  <div class="page-hdr">
    <div>
      <div class="page-title"><i class="fas fa-clipboard-list" style="color:var(--blue)"></i> Staff Jobs</div>
      <div style="font-size:12px;color:var(--ink3);margin-top:3px">General tasks, office jobs and showroom work — assigned to any team member</div>

  <!-- KPIs -->

  <!-- FILTER BAR -->

    <div class="filter-tabs" id="status-tabs"></div>
    <input class="search-box" id="search-box" placeholder="🔍 Search jobs..." oninput="renderJobs()">
    <select class="sel-filter" id="assign-filter" onchange="renderJobs()">
      <option value="all">All Staff</option>
    </select>
    <select class="sel-filter" id="priority-filter" onchange="renderJobs()">
      <option value="all">All Priorities</option>
      <option value="High">High Priority</option>
      <option value="Medium">Medium Priority</option>

<!-- NEW JOB MODAL -->
<div class="modal-bg" id="job-modal">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modal-title">New Job</div>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">Job Title *</label>
        <input type="text" class="form-input" id="j-title" placeholder="e.g. Clean showroom entrance, File V5 documents...">
      </div>
      <div class="form-row">
        <label class="form-label">Notes / Description</label>
        <textarea class="form-textarea" id="j-notes" placeholder="Any extra details, instructions or context..."></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-row">
          <label class="form-label">Assign To *</label>
          <select class="form-input" id="j-assign"></select>
        </div>
        <div class="form-row">
          <label class="form-label">Priority</label>
          <select class="form-input" id="j-priority">
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Low">Low</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-row">
          <label class="form-label">Deadline (optional)</label>
          <input type="datetime-local" class="form-input" id="j-deadline">
        </div>
        <div class="form-row">
          <label class="form-label">Remind Before</label>
          <select class="form-input" id="j-reminder">
            <option value="">No reminder</option>
            <option value="30">30 minutes before</option>
            <option value="60">1 hour before</option>
            <option value="120">2 hours before</option>
            <option value="1440">1 day before</option>
            <option value="2880">2 days before</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Assigned By</label>
        <select class="form-input" id="j-assignedby"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-red" onclick="saveJob()"><i class="fas fa-save"></i> <span id="save-btn-label">Create Job</span></button>
    </div>
  </div>
</div>

<script>

// ── DATA ─────────────────────────────────────────────────────────────
const STORAGE_KEY = 'ce_staff_jobs';
let jobs = [];
let activeFilter = 'all';
let editingId = null;

function loadJobs() {
  try {
    jobs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    // Also load from Firestore for cross-device sync
    if (typeof FS !== 'undefined' && FS) {
      FS.collection('staff_jobs').orderBy('createdAt','desc').get()
        .then(function(snap) {
          var fsJobs = [];
          snap.forEach(function(doc) { fsJobs.push(Object.assign({_id:doc.id},doc.data())); });
          if (fsJobs.length >= jobs.length) {
            jobs = fsJobs;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs));
            renderJobs();
          }
        }).catch(function(){});
    }
  } catch(e) { jobs = []; }
  if (!jobs.length) seedDemoJobs();
}

function saveJobs() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs));
  // Also sync latest job to Firestore
  if (typeof FS !== 'undefined' && FS && jobs.length) {
    // Sync all jobs to Firestore
    jobs.forEach(function(job) {
      var docId = job._id || 'job_'+job.id;
      FS.collection('staff_jobs').doc(String(docId)).set(job).catch(function(){});
    });
  }
}

function seedDemoJobs() {
  const now = Date.now();
  const day = 86400000;
  jobs = [
    { id: 1, title: 'Tidy forecourt and arrange display vans', notes: 'Move the three vans at the back row to front row display positions. Check tyre pressures on all forecourt stock.', assignedTo: 'Gorgino Barnes', assignedBy: 'Keith Hardy', priority: 'High', status: 'To Do', created: now - day*2, deadline: new Date(Date.now() + 3*3600000).toISOString().slice(0,16), reminder: '60' },
    { id: 2, title: 'File all V5 documents received this week', notes: 'Three V5s arrived Tuesday — need to match to stock numbers and file in the cabinet.', assignedTo: 'Germaine Dua', assignedBy: 'Keith Hardy', priority: 'Medium', status: 'In Progress', created: now - day, deadline: '', reminder: '' },
    { id: 3, title: 'Update price boards on showroom floor', notes: 'New prices were approved Friday. All retail boards need updating before the weekend.', assignedTo: 'Haider Ahmed', assignedBy: 'Keith Hardy', priority: 'High', status: 'To Do', created: now - day*3, deadline: new Date(Date.now() - 2*3600000).toISOString().slice(0,16), reminder: '' },
    { id: 4, title: 'Order coffee machine pods and office supplies', notes: 'Running low on pods. Also need printer paper and a new stapler.', assignedTo: 'Moamel Alameri', assignedBy: 'Germaine Dua', priority: 'Low', status: 'Done', created: now - day*5, deadline: '', reminder: '' },
    { id: 5, title: 'Check and top up all forecourt vehicle screenwashes', notes: 'Six vehicles on the front row — check and fill. Fluid is in the workshop store.', assignedTo: 'Fred', assignedBy: 'Ibrahim Ata', priority: 'Medium', status: 'Done', created: now - day*4, deadline: '', reminder: '' },
    { id: 6, title: 'Print and laminate new MOT price list for reception', notes: 'Updated list is saved on the shared drive. Print A3 and laminate. Put in reception stand.', assignedTo: 'Ismael Al Ameri', assignedBy: 'Keith Hardy', priority: 'Low', status: 'To Do', created: now - 3600000, deadline: '', reminder: '' },
  ];
  saveJobs();
}

// ── HELPERS ───────────────────────────────────────────────────────────
function isOverdue(job) {
  if (!job.deadline || job.status === 'Done') return false;
  return new Date(job.deadline) < new Date();
}
function deadlineLabel(job) {
  if (!job.deadline) return null;
  const diff = new Date(job.deadline) - Date.now();
  const hours = Math.floor(diff / 3600000);
  const mins = Math.floor(diff / 60000);
  if (diff < 0) return { text: 'Overdue by ' + Math.abs(Math.floor(diff/3600000)) + 'hr', cls: 'deadline-warn' };
  if (hours < 2) return { text: 'Due in ' + mins + ' mins', cls: 'deadline-warn' };
  if (hours < 24) return { text: 'Due in ' + hours + ' hours', cls: 'deadline-near' };
  const d = new Date(job.deadline);
  return { text: 'Due ' + d.toLocaleDateString('en-GB', {day:'numeric',month:'short'}) + (job.deadline.includes('T') ? ' at ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : ''), cls: '' };
}
const PRIORITY_COLOR = { High: '#ef4444', Medium: '#d4980a', Low: '#94a3b8' };

// ── KPIs ─────────────────────────────────────────────────────────────
function buildKPIs() {
  const todo = jobs.filter(j => j.status === 'To Do').length;
  const progress = jobs.filter(j => j.status === 'In Progress').length;
  const done = jobs.filter(j => j.status === 'Done').length;
  const overdue = jobs.filter(j => isOverdue(j)).length;
  const kpis = [
    { v: jobs.length, l: 'Total Jobs', c: '#003DA5' },
    { v: todo, l: 'To Do', c: '#6366f1' },
    { v: progress, l: 'In Progress', c: '#d4980a' },
    { v: overdue, l: 'Overdue', c: '#ef4444' },
    { v: done, l: 'Completed', c: '#1a7f37' },
  ];
  document.getElementById('kpi-row').innerHTML = kpis.map(k =>
    `<div class="kpi-card" style="border-top-color:${k.c}">
      <div class="kpi-val" style="color:${k.c}">${k.v}</div>
      <div class="kpi-label">${k.l}</div>
    </div>`
  ).join('');
}

// ── FILTER TABS ───────────────────────────────────────────────────────
function buildTabs() {
  const tabs = [
    { id: 'all', label: 'All', count: jobs.length },
    { id: 'todo', label: 'To Do', count: jobs.filter(j => j.status === 'To Do').length },
    { id: 'progress', label: 'In Progress', count: jobs.filter(j => j.status === 'In Progress').length },
    { id: 'overdue', label: 'Overdue', count: jobs.filter(j => isOverdue(j)).length, cls: 'overdue' },
    { id: 'done', label: 'Done', count: jobs.filter(j => j.status === 'Done').length, cls: 'done' },
  ];
  document.getElementById('status-tabs').innerHTML = tabs.map(t =>
    `<div class="ftab ${t.cls||''} ${activeFilter === t.id ? 'active' : ''}" onclick="setFilter('${t.id}')">
      ${t.label} <span style="opacity:.7">(${t.count})</span>
    </div>`
  ).join('');
}

function setFilter(f) {
  activeFilter = f;
  buildTabs();
  renderJobs();
}

// ── STAFF DROPDOWNS ───────────────────────────────────────────────────
function populateStaffDropdowns() {
  const sel = document.getElementById('assign-filter');
  const jAssign = document.getElementById('j-assign');
  const jBy = document.getElementById('j-assignedby');
  const opts = AC_STAFF.map(s => `<option value="${s.name}">${s.name} — ${s.dept}</option>`).join('');
  sel.innerHTML = '<option value="all">All Staff</option>' + AC_STAFF.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
  jAssign.innerHTML = '<option value="">Select staff member...</option>' + opts;
  jBy.innerHTML = opts;
  // Default assignedBy to current user
  const cu = getCurrentUser();
  if (cu) { jBy.value = cu.name || ''; }
}

// ── RENDER JOBS ───────────────────────────────────────────────────────
function renderJobs() {
  const search = (document.getElementById('search-box').value || '').toLowerCase();
  const assignF = document.getElementById('assign-filter').value;
  const priF = document.getElementById('priority-filter').value;

  let filtered = jobs.slice();

  // Status filter
  if (activeFilter === 'todo') filtered = filtered.filter(j => j.status === 'To Do');
  else if (activeFilter === 'progress') filtered = filtered.filter(j => j.status === 'In Progress');
  else if (activeFilter === 'overdue') filtered = filtered.filter(j => isOverdue(j));
  else if (activeFilter === 'done') filtered = filtered.filter(j => j.status === 'Done');

  // Search
  if (search) filtered = filtered.filter(j =>
    (j.title||'').toLowerCase().includes(search) ||
    (j.notes||'').toLowerCase().includes(search) ||
    (j.assignedTo||'').toLowerCase().includes(search)
  );

  // Staff filter
  if (assignF !== 'all') filtered = filtered.filter(j => j.assignedTo === assignF);
  if (priF !== 'all') filtered = filtered.filter(j => j.priority === priF);

  // Sort: overdue first, then by created desc
  filtered.sort((a, b) => {
    const aOver = isOverdue(a) ? 1 : 0;
    const bOver = isOverdue(b) ? 1 : 0;
    if (bOver !== aOver) return bOver - aOver;
    return b.created - a.created;
  });

  const grid = document.getElementById('job-grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-clipboard-check"></i><p>No jobs found</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(job => {
    const over = isOverdue(job);
    const pCol = PRIORITY_COLOR[job.priority] || '#94a3b8';
    const dl = deadlineLabel(job);
    const statusCls = { 'To Do': 'sb-todo', 'In Progress': 'sb-progress', 'Done': 'sb-done' };
    const cardCls = over ? 'overdue' : (job.priority || 'medium').toLowerCase() + '-priority';
    const isDone = job.status === 'Done';

    let actionBtns = '';
    if (isDone) {
      actionBtns = `<div class="jc-btn reopen" onclick="setStatus(${job.id},'To Do')"><i class="fas fa-undo"></i> Reopen</div>`;
    } else if (job.status === 'To Do') {
      actionBtns = `
        <div class="jc-btn progress" onclick="setStatus(${job.id},'In Progress')"><i class="fas fa-play"></i> Start</div>
        <div class="jc-btn complete" onclick="setStatus(${job.id},'Done')"><i class="fas fa-check"></i> Done</div>`;
    } else {
      actionBtns = `
        <div class="jc-btn" onclick="setStatus(${job.id},'To Do')"><i class="fas fa-pause"></i> Pause</div>
        <div class="jc-btn complete" onclick="setStatus(${job.id},'Done')"><i class="fas fa-check"></i> Complete</div>`;
    }

    return `<div class="job-card ${cardCls} ${isDone ? 'done-card' : ''}">
      <div class="jc-top">
        <div class="jc-title">${job.title}</div>
        <div class="jc-meta">
          <div class="priority-dot" style="background:${pCol}"></div>
          <span class="priority-label" style="color:${pCol}">${job.priority}</span>
          <span class="status-badge ${over ? 'sb-overdue' : (statusCls[job.status]||'sb-todo')}">${over ? '⚠ Overdue' : job.status}</span>
        </div>
      </div>
      ${job.notes ? `<div class="jc-notes">${job.notes}</div>` : ''}
      <div class="jc-info">
        <span><i class="fas fa-user"></i> ${job.assignedTo}</span>
        <span style="color:#94a3b8">by ${job.assignedBy||'—'}</span>
        ${dl ? `<span class="${dl.cls}"><i class="fas fa-clock"></i> ${dl.text}</span>` : ''}
      </div>
      <div class="jc-actions">
        ${actionBtns}
        <div class="jc-btn" style="flex:0;padding:7px 10px" onclick="editJob(${job.id})" title="Edit"><i class="fas fa-edit"></i></div>
        <div class="jc-btn" style="flex:0;padding:7px 10px;color:#ef4444" onclick="deleteJob(${job.id})" title="Delete"><i class="fas fa-trash"></i></div>
      </div>
    </div>`;
  }).join('');
}

// ── ACTIONS ───────────────────────────────────────────────────────────
function setStatus(id, status) {
  const job = jobs.find(j => j.id === id);
  if (!job) return;
  job.status = status;
  if (status === 'Done') job.completedAt = Date.now();
  saveJobs();
  buildKPIs();
  buildTabs();
  renderJobs();
  showToast(status === 'Done' ? '✓ Job marked complete' : 'Status updated', 'success');
}

function deleteJob(id) {
  if (!confirm('Delete this job?')) return;
  jobs = jobs.filter(j => j.id !== id);
  saveJobs();
  buildKPIs();
  buildTabs();
  renderJobs();
  showToast('Job deleted', 'info');
}

function editJob(id) {
  const job = jobs.find(j => j.id === id);
  if (!job) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Job';
  document.getElementById('save-btn-label').textContent = 'Save Changes';
  document.getElementById('j-title').value = job.title || '';
  document.getElementById('j-notes').value = job.notes || '';
  document.getElementById('j-assign').value = job.assignedTo || '';
  document.getElementById('j-assignedby').value = job.assignedBy || '';
  document.getElementById('j-priority').value = job.priority || 'Medium';
  document.getElementById('j-deadline').value = job.deadline || '';
  document.getElementById('j-reminder').value = job.reminder || '';
  document.getElementById('job-modal').classList.add('open');
}

// ── MODAL ─────────────────────────────────────────────────────────────
function openNewJob() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'New Job';
  document.getElementById('save-btn-label').textContent = 'Create Job';
  document.getElementById('j-title').value = '';
  document.getElementById('j-notes').value = '';
  document.getElementById('j-assign').value = '';
  document.getElementById('j-priority').value = 'Medium';
  document.getElementById('j-deadline').value = '';
  document.getElementById('j-reminder').value = '';
  const cu = getCurrentUser();
  if (cu) document.getElementById('j-assignedby').value = cu.name || '';
  document.getElementById('job-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('job-modal').classList.remove('open');
  editingId = null;
}

function saveJob() {
  const title = document.getElementById('j-title').value.trim();
  const assign = document.getElementById('j-assign').value;
  if (!title) { showToast('Please enter a job title', 'error'); return; }
  if (!assign) { showToast('Please assign the job to a staff member', 'error'); return; }

  if (editingId) {
    const job = jobs.find(j => j.id === editingId);
    if (job) {
      job.title = title;
      job.notes = document.getElementById('j-notes').value.trim();
      job.assignedTo = assign;
      job.assignedBy = document.getElementById('j-assignedby').value;
      job.priority = document.getElementById('j-priority').value;
      job.deadline = document.getElementById('j-deadline').value;
      job.reminder = document.getElementById('j-reminder').value;
    }
    showToast('Job updated', 'success');
  } else {
    jobs.unshift({
      id: Date.now(),
      title,
      notes: document.getElementById('j-notes').value.trim(),
      assignedTo: assign,
      assignedBy: document.getElementById('j-assignedby').value,
      priority: document.getElementById('j-priority').value,
      deadline: document.getElementById('j-deadline').value,
      reminder: document.getElementById('j-reminder').value,
      status: 'To Do',
      created: Date.now(),
    });
    showToast('Job created and assigned to ' + assign, 'success');
  }

  saveJobs();
  closeModal();
  buildKPIs();
  buildTabs();
  renderJobs();
}

document.addEventListener("DOMContentLoaded", function() {
// ── INIT ─────────────────────────────────────────────────────────────
document.getElementById('nav-user').textContent = getCurrentUser().name;
loadJobs();
populateStaffDropdowns();
buildKPIs();
buildTabs();
renderJobs();

// Last import badge
(function(){
  try {
    var ts = Math.max(parseInt(localStorage.getItem('ce_last_import_stock')||'0'),parseInt(localStorage.getItem('ce_last_import_etrack')||'0'));
    var el = document.getElementById('lastImportBadge');
    if(!el||!ts)return;
    var ago = Math.floor((Date.now()-ts)/3600000);
    el.textContent = ago < 24 ? 'Imported '+ago+'hr ago' : 'Imported '+Math.floor(ago/24)+'d ago';
  } catch(e){}
})();
});

</script>

<!-- NOTIFICATION PANEL -->
<div class="notif-overlay" id="notifOverlay" onclick="closeNotifPanel()"></div>
<div class="notif-panel" id="notifPanel">
  <div class="notif-hdr">
    <span class="notif-title"><i class="fas fa-bell"></i> Notifications</span>
    <button onclick="markAllRead();renderNotifPanel()" style="background:none;border:none;font-size:11px;color:var(--ink3);cursor:pointer;font-family:inherit;font-weight:600">Mark all read</button>
    <button onclick="closeNotifPanel()" style="background:none;border:none;font-size:16px;cursor:pointer;color:var(--ink3);padding:2px 6px">&times;</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>
<script>
// ── NAV BELL ──────────────────────────────────────────────────────
function updateBell() {
  var count = getUnreadCount();
  var badge = document.getElementById('bellBadge');
  if (!badge) return;
  if (count > 0) {
    badge.style.display = 'flex';
    badge.textContent = count > 9 ? '9+' : count;
  } else {
    badge.style.display = 'none';
  }
}

function openNotifPanel() {
  document.getElementById('notifPanel').classList.add('open');
  document.getElementById('notifOverlay').classList.add('open');
  renderNotifPanel();
  markAllRead();
  setTimeout(updateBell, 300);
}

function closeNotifPanel() {
  document.getElementById('notifPanel').classList.remove('open');
  document.getElementById('notifOverlay').classList.remove('open');
}

function renderNotifPanel() {
  var notifs = getMyNotifications();
  var list = document.getElementById('notifList');
  if (!notifs.length) {
    list.innerHTML = '<div class="notif-empty"><i class="fas fa-bell-slash"></i>No notifications yet</div>';
    return;
  }
  list.innerHTML = notifs.slice(0, 30).map(function(n) {
    var ago = timeAgo(n.ts);
    var typeLabel = { handover:'Handover', urgent:'Urgent', skip:'Skipped', sendback:'Sent Back', fault:'Fault' }[n.type] || n.type;
    return '<div class="notif-item' + (n.read ? '' : ' unread') + '" onclick="window.location.href=\'' + (n.link||'workflow.html') + '\'">' +
      '<div class="notif-item-hdr">' +
      '<span class="notif-reg">' + n.reg + '</span>' +
      '<span class="notif-type ' + n.type + '">' + typeLabel + '</span>' +
      '</div>' +
      '<div class="notif-body">' + n.vehicle + ' — ' + n.stage + (n.fromName ? ' · from ' + n.fromName : '') + '</div>' +
      (n.note ? '<div class="notif-meta">"' + n.note.slice(0,60) + (n.note.length>60?'…':'') + '"</div>' : '') +
      '<div class="notif-meta">' + ago + '</div>' +
      '</div>';
  }).join('');
}

function timeAgo(ts) {
  var diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'hr ago';
  return Math.floor(diff/86400) + 'd ago';
}

// Poll for new notifications every 60s
setInterval(updateBell, 60000);
document.addEventListener('DOMContentLoaded', function() { setTimeout(updateBell, 1000); });
</script>
</body>
</html>

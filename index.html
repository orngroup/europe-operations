<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORN Operations &amp; Reconfirmation Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{
  /* LIGHT THEME (default) */
  --bg:#f4f5f8; --panel:#ffffff; --panel2:#f2f4f7; --line:#e6e9ef; --line2:#d5dae3;
  --text:#1d2433; --muted:#5f6880; --faint:#9aa2b5;
  --gold:#a9801e; --gold-dim:#c9a94f; --gold-bg:rgba(169,128,30,.08);
  --navy:#2d4468; --teal:#1d6f9b; --cyan:#0092c8; --green:#4aa845; --yellow:#d8bf0a; --red:#d92d0e;
  --ok:#2c9e51; --warn:#c4890c; --danger:#cc3a24;
  --shadow:0 1px 3px rgba(20,26,40,.07), 0 4px 14px rgba(20,26,40,.05);
  --radius:12px;
}
[data-theme="dark"]{
  --bg:#0b0d12; --panel:#12151d; --panel2:#181c26; --line:#242a38; --line2:#2f3748;
  --text:#e8eaf0; --muted:#8b93a7; --faint:#5b6376;
  --gold:#d4af5f; --gold-dim:#9c8140; --gold-bg:rgba(212,175,95,.08);
  --cyan:#00a7e1; --green:#6cc766; --yellow:#f2df1d; --red:#e63312;
  --ok:#4fbf6b; --warn:#f0b429; --danger:#e6533c;
  --shadow:none;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;background:var(--panel);border:1px solid var(--line2);color:var(--text);border-radius:8px;padding:8px 10px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
textarea{resize:vertical;min-height:60px}
::placeholder{color:var(--faint)}
a{color:var(--cyan)}


/* Login */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px}
.login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:36px 40px;width:min(400px,92vw);display:flex;flex-direction:column;gap:14px;box-shadow:var(--shadow)}
.login-card h1{font-size:20px;font-weight:700;letter-spacing:.3px}
.login-card .sub{color:var(--muted);font-size:12.5px;margin-top:-8px}
.btn{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-weight:700;font-size:13.5px;letter-spacing:.2px}
[data-theme="dark"] .btn{color:#14110a}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line2);font-weight:600}
.btn.ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn.small{padding:6px 12px;font-size:12.5px}
.btn.danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}
.err{color:var(--danger);font-size:12.5px;min-height:16px}

/* App layout: sidebar + content */
#appView{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}
aside.sidebar{width:236px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.side-brand{display:flex;align-items:center;gap:11px;padding:18px 18px 14px}
.side-brand .t{font-weight:800;font-size:14px;letter-spacing:.3px}
.side-brand .t small{display:block;font-weight:600;color:var(--gold);font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase}
nav.side{display:flex;flex-direction:column;gap:2px;padding:6px 10px;flex:1}
nav.side .nv{background:transparent;border:none;color:var(--muted);padding:9px 12px;border-radius:8px;font-weight:600;font-size:13px;text-align:left;display:flex;justify-content:space-between;align-items:center;width:100%}
nav.side .nv:hover{color:var(--text);background:var(--panel2)}
nav.side .nv.active{background:var(--gold-bg);color:var(--gold)}
nav.side .nv .cnt{font-size:10.5px;font-weight:700;background:var(--panel2);color:var(--muted);border-radius:12px;padding:1px 8px}
nav.side .nv.active .cnt{background:var(--gold);color:#fff}
[data-theme="dark"] nav.side .nv.active .cnt{color:#14110a}
nav.side .group-lbl{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);font-weight:700;padding:14px 12px 4px}
nav.side .nv.month{padding-left:22px;font-size:12.5px;font-weight:500}
.side-foot{padding:12px 14px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:9px}
.side-user{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted)}
.side-user .avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0}
[data-theme="dark"] .side-user .avatar{color:#14110a}
.sync-pill{font-size:10px;letter-spacing:.8px;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid var(--line2);color:var(--muted);text-align:center}
.sync-pill.live{border-color:var(--ok);color:var(--ok)}
.side-foot .row2{display:flex;gap:6px}
.side-foot .row2 .btn{flex:1}

.content{flex:1;min-width:0;padding:22px 26px;max-width:1400px}
.mobile-top{display:none}

.view{display:none}
.view.active{display:block}
h2.vtitle{font-size:17px;font-weight:700;margin-bottom:4px}
.vsub{color:var(--muted);font-size:12.5px;margin-bottom:18px}

/* Dashboard */
.tband-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.tband{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;cursor:pointer;border-top:3px solid var(--line2);transition:transform .12s;box-shadow:var(--shadow)}
.tband:hover{transform:translateY(-2px)}
.tband .n{font-size:26px;font-weight:800}
.tband .l{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600}
.tband .d{font-size:11.5px;color:var(--faint);margin-top:2px}
.tband.b15{border-top-color:var(--red)} .tband.b15 .n{color:var(--red)}
.tband.b30{border-top-color:var(--yellow)} .tband.b30 .n{color:var(--warn)}
.tband.b45{border-top-color:var(--cyan)} .tband.b45 .n{color:var(--cyan)}
.tband.b60{border-top-color:var(--teal)} .tband.b60 .n{color:var(--teal)}
.tband.blater{border-top-color:var(--green)} .tband.blater .n{color:var(--green)}
.tband.btrav{border-top-color:var(--gold)} .tband.btrav .n{color:var(--gold)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.card h3{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:12px}
.bignum{font-size:30px;font-weight:800}
.bignum.saving{color:var(--ok)} .bignum.loss{color:var(--danger)}
.subnum{color:var(--muted);font-size:12px}
.chart-wrap{position:relative;height:210px}
.stat-list{display:flex;flex-direction:column;gap:8px}
.stat-list .row{display:flex;justify-content:space-between;align-items:center;font-size:13px;border-bottom:1px solid var(--line);padding-bottom:6px}
.stat-list .row:last-child{border-bottom:none}
.stat-list .row b{font-weight:700}

.task-item{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.task-item:hover .ref{color:var(--gold)}
.task-item:last-child{border-bottom:none}
.task-item .badge{flex-shrink:0;margin-top:2px}
.task-item .ref{font-weight:700;font-size:13px}
.task-item .meta{color:var(--muted);font-size:12px}

.badge{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid}
.badge.b15{color:var(--red);border-color:var(--red)}
.badge.b30{color:var(--warn);border-color:var(--warn)}
.badge.b45{color:var(--cyan);border-color:var(--cyan)}
.badge.b60{color:var(--teal);border-color:var(--teal)}
.badge.blater{color:var(--green);border-color:var(--green)}
.badge.btrav{color:var(--gold);border-color:var(--gold)}
.badge.bdone{color:var(--faint);border-color:var(--line2)}
.chip{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.chip.Confirmed{background:rgba(44,158,81,.13);color:var(--ok)}
.chip.Reconfirmed{background:rgba(44,158,81,.22);color:var(--ok)}
.chip.Pending{background:rgba(196,137,12,.13);color:var(--warn)}
.chip.Cancelled{background:rgba(154,162,181,.18);color:var(--faint);text-decoration:line-through}
.chip.Issue{background:rgba(204,58,36,.12);color:var(--danger)}
.chip.svc{background:var(--panel2);color:var(--muted);border:1px solid var(--line2);font-weight:600}
.pill-src{font-size:10.5px;font-weight:800;letter-spacing:.6px;padding:2px 8px;border-radius:4px}
.pill-src.USA{background:rgba(0,146,200,.12);color:var(--cyan)}
.pill-src.Australia{background:rgba(74,168,69,.13);color:var(--green)}
.pill-src.Other{background:var(--gold-bg);color:var(--gold)}
.var-pos{color:var(--ok);font-weight:700}
.var-neg{color:var(--danger);font-weight:700}
.var-chk{color:var(--warn);font-weight:600;font-size:11.5px}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.toolbar input[type=search]{max-width:280px}
.toolbar select{width:auto;min-width:130px}
table.bk{width:100%;border-collapse:collapse;background:var(--panel);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
table.bk th{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);text-align:left;padding:10px;border-bottom:1px solid var(--line2);font-weight:700;background:var(--panel2)}
table.bk td{padding:10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
table.bk tbody tr{cursor:pointer}
table.bk tbody tr:hover{background:var(--gold-bg)}
table.bk tbody tr:last-child td{border-bottom:none}
table.bk.static tbody tr{cursor:default}
table.bk td input, table.bk td select{background:transparent;border-color:transparent;padding:4px 6px}
table.bk td input:hover, table.bk td select:hover{border-color:var(--line2)}
table.bk td input:focus, table.bk td select:focus{border-color:var(--gold);background:var(--panel)}
.prog{width:90px;height:6px;background:var(--panel2);border:1px solid var(--line);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.prog i{display:block;height:100%;background:var(--green)}
.prog-label{font-size:11.5px;color:var(--muted);margin-left:6px}

.modal-back{display:none;position:fixed;inset:0;background:rgba(18,22,32,.55);z-index:100;overflow-y:auto;padding:30px 14px}
.modal-back.open{display:block}
.modal{background:var(--panel);border:1px solid var(--line2);border-radius:16px;max-width:1150px;margin:0 auto;padding:24px 26px;box-shadow:var(--shadow)}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.modal-head h2{font-size:18px;font-weight:800}
.modal-head .meta{color:var(--muted);font-size:12.5px;margin-top:3px}
.close-x{background:transparent;border:1px solid var(--line2);color:var(--muted);border-radius:8px;width:32px;height:32px;font-size:15px}
.close-x:hover{color:var(--text);border-color:var(--gold)}
.field-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.field-grid label,.fld label{display:block;font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:4px}
.fld{margin-bottom:10px}

.comp{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;background:var(--panel2);overflow:hidden}
.comp-head{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;flex-wrap:wrap}
.comp-head:hover{background:var(--gold-bg)}
.comp-head .date{font-weight:700;font-size:12.5px;color:var(--gold);white-space:nowrap}
.comp-head .act{flex:1;font-size:13px;font-weight:600;min-width:180px}
.comp-head .sup{color:var(--muted);font-size:12px;white-space:nowrap}
.comp-body{display:none;padding:14px;border-top:1px solid var(--line);background:var(--panel)}
.comp.open .comp-body{display:block}
.sixpoint{background:var(--gold-bg);border:1px dashed var(--gold-dim);border-radius:10px;padding:12px;margin-top:10px}
.sixpoint h4{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-weight:700}
.sp-status{font-size:11.5px;font-weight:700;margin-left:8px}
.sp-status.ok{color:var(--ok)} .sp-status.no{color:var(--warn)}
.attach-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.attach-item{display:flex;align-items:center;gap:10px;font-size:12.5px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 10px}
.attach-item .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-item .sz{color:var(--faint);font-size:11px}
.comment{border-left:2px solid var(--gold-dim);padding:6px 10px;margin-bottom:8px;font-size:12.5px}
.comment .who{font-weight:700;color:var(--gold);font-size:11.5px}
.comment .when{color:var(--faint);font-size:10.5px;margin-left:6px}

.log-row{display:flex;gap:14px;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px;flex-wrap:wrap}
.log-row .ts{color:var(--faint);white-space:nowrap;width:135px}
.log-row .who{font-weight:700;color:var(--gold);width:110px}
.log-row .what{flex:1;min-width:200px}

.banner{background:rgba(196,137,12,.08);border:1px solid rgba(196,137,12,.35);color:var(--warn);border-radius:10px;padding:10px 14px;font-size:12.5px;margin-bottom:16px}
.hint{color:var(--faint);font-size:11.5px;margin-top:4px}
.section-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:18px 0 8px}
.flex-between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.empty{color:var(--faint);font-size:13px;text-align:center;padding:26px 0}
.tbl-scroll{overflow-x:auto}
.pw-cell{font-family:monospace;letter-spacing:1px}

@media(max-width:900px){
  .layout{flex-direction:column}
  aside.sidebar{width:100%;height:auto;position:static;flex-direction:column;display:none;border-right:none;border-bottom:1px solid var(--line)}
  aside.sidebar.open{display:flex}
  .mobile-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:60}
  .content{padding:16px}
  .grid2{grid-template-columns:1fr}
  .log-row .ts{width:auto}
}
</style>
</head>
<body>

<div id="loginView">
  <div style="text-align:center">
    <div style="font-weight:800;font-size:34px;letter-spacing:8px">ORN</div>
  </div>
  <div class="login-card">
    <h1>Operations &amp; Reconfirmation Hub</h1>
    <div class="sub">US &amp; Australia bookings — reconfirmation control</div>
    <div class="fld"><label>User ID</label><input id="loginUser" placeholder="e.g. AK" autocomplete="username"></div>
    <div class="fld"><label>Password</label><input id="loginPass" type="password" autocomplete="current-password"></div>
    <div class="err" id="loginErr"></div>
    <button class="btn" onclick="doLogin()">Sign in</button>
  </div>
</div>

<div id="appView">
  <div class="mobile-top">
    <div class="side-brand" style="padding:0"><div class="t" style="font-size:16px;letter-spacing:3px">ORN <small>Ops Hub</small></div></div>
    <button class="btn ghost small" onclick="document.getElementById('sideNav').classList.toggle('open')">☰ Menu</button>
  </div>
  <div class="layout">
    <aside class="sidebar" id="sideNav">
      <div class="side-brand">
        <div class="t" style="font-size:17px;letter-spacing:3px">ORN <small>Ops &amp; Reconfirmation</small></div>
      </div>
      <nav class="side" id="sideMenu"></nav>
      <div class="side-foot">
        <span class="sync-pill" id="syncPill">Local</span>
        <div class="side-user"><div class="avatar" id="userAvatar">--</div><span id="userName"></span></div>
        <div class="row2">
          <button class="btn ghost small" id="themeBtn" onclick="toggleTheme()">Dark mode</button>
          <button class="btn ghost small" onclick="doLogout()">Sign out</button>
        </div>
      </div>
    </aside>
    <main class="content">
      <div class="view active" id="view-dashboard"></div>
      <div class="view" id="view-bookings"></div>
      <div class="view" id="view-takeover"></div>
      <div class="view" id="view-cards"></div>
      <div class="view" id="view-refunds"></div>
      <div class="view" id="view-suppliers"></div>
      <div class="view" id="view-ota"></div>
      <div class="view" id="view-rail"></div>
      <div class="view" id="view-activity"></div>
      <div class="view" id="view-settings"></div>
    </main>
  </div>
</div>

<div class="modal-back" id="modalBack" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<script>
/* ============================================================

<script>
/* ================= STATE & PERSISTENCE ================= */
let DB = null, FIRE = false;
let state = {
  user: null,
  bookings: [],           // [{id, fileNo, source, contact, pax, attachedTrips, tripStart, tripEnd, components:[...], comments:[...], updatedAt, updatedBy}]
  users: [],
  fx: {...DEFAULT_FX},
  activity: [],
  attachments: {},        // id -> meta (data loaded on demand in FIRE mode)
  refunds: [], suppliers: [], ota: [], rail: [], cards: [],
  filters: { q:'', source:'', status:'', service:'', band:'', month:'', activityKw:'', era:'' },
  charts: {}
};

function lsGet(k, d){ try{ const v = localStorage.getItem('ornrecon_'+k); return v? JSON.parse(v): d; }catch(e){ return d; } }
function lsSet(k, v){ localStorage.setItem('ornrecon_'+k, JSON.stringify(v)); }

function initPersistence(){
  if (FIREBASE_CONFIG.apiKey){
    try{
      firebase.initializeApp(FIREBASE_CONFIG);
      DB = firebase.firestore(); FIRE = true;
      document.getElementById('syncPill').textContent = 'Live · Firebase';
      document.getElementById('syncPill').classList.add('live');
      subscribeFirebase();
    }catch(e){ console.error(e); FIRE=false; loadLocal(); }
  } else {
    loadLocal();
  }
}

function loadLocal(){
  state.users = lsGet('users', null) || DEFAULT_USERS.slice();
  mergeDefaultUsers();
  state.fx = lsGet('fx', null) || {...DEFAULT_FX};
  state.activity = lsGet('activity', []);
  state.attachments = lsGet('attachments', {});
  let bk = lsGet('bookings', null);
  if (!bk || !bk.length){
    bk = SEED_BOOKINGS.map(seedToBooking);
    lsSet('bookings', bk);
    lsSet('seedVersion', SEED_VERSION);
  } else if ((lsGet('seedVersion',0)||0) < SEED_VERSION){
    // New seed shipped: add any seed bookings not present locally, never overwriting edited ones
    const have = new Set(bk.map(b=>b.id));
    let added = 0;
    SEED_BOOKINGS.forEach(sb=>{ if (!have.has(sb.fileNo)){ bk.push(seedToBooking(sb)); added++; } });
    lsSet('bookings', bk);
    lsSet('seedVersion', SEED_VERSION);
    if (added) console.log('Seed update: added '+added+' bookings');
  }
  state.bookings = bk;
  const seedList = (key, prefix)=>{
    let cur = lsGet(key, null);
    if (!cur || !cur.length) cur = (SEED_EXTRA[key]||[]).map((r,i)=>({id:prefix+i, ...r}));
    return cur;
  };
  state.refunds = seedList('refunds','rf');
  state.suppliers = seedList('suppliers','sp');
  state.ota = seedList('ota','ot');
  state.rail = lsGet('rail', []);
  state.cards = lsGet('cards', []);
  ['refunds','suppliers','ota','rail','cards'].forEach(k=>lsSet(k, state[k]));
  renderAll();
}

function mergeDefaultUsers(){
  let changed = false;
  DEFAULT_USERS.forEach(du=>{
    if (!state.users.some(u=>u.id===du.id)){ state.users.push(du); changed=true; }
  });
  if (changed) saveUsers();
}

function subscribeFirebase(){
  DB.collection(COLL.users).onSnapshot(s=>{
    if (s.empty){ DEFAULT_USERS.forEach(u=>DB.collection(COLL.users).doc(u.id).set(u)); return; }
    state.users = s.docs.map(d=>d.data());
    mergeDefaultUsers();
    renderSettings();
  });
  ['refunds','suppliers','ota','rail','cards'].forEach(k=>{
    DB.collection(COLL[k]).onSnapshot(s=>{
      if (s.empty && (SEED_EXTRA[k]||[]).length && !window['__seeded_'+k]){
        window['__seeded_'+k] = true;
        (SEED_EXTRA[k]||[]).forEach((r,i)=>DB.collection(COLL[k]).doc(k.slice(0,2)+i).set({id:k.slice(0,2)+i, ...r}));
        return;
      }
      state[k] = s.docs.map(d=>d.data());
      renderListView(k);
    });
  });
  DB.collection(COLL.settings).doc('fx').onSnapshot(d=>{
    if (d.exists) state.fx = d.data(); else DB.collection(COLL.settings).doc('fx').set(DEFAULT_FX);
    renderAll();
  });
  DB.collection(COLL.bookings).onSnapshot(s=>{
    if (s.empty && !window.__seedOffered){ window.__seedOffered = true; offerSeed(); }
    state.bookings = s.docs.map(d=>d.data());
    renderAll();
    if (openBookingId) refreshBookingModal();
  });
  DB.collection(COLL.activity).orderBy('ts','desc').limit(400).onSnapshot(s=>{
    state.activity = s.docs.map(d=>d.data()); renderActivity();
  });
  DB.collection(COLL.attachments).onSnapshot(s=>{
    const m = {}; s.docs.forEach(d=>{ const a=d.data(); m[a.id]={id:a.id,bookingId:a.bookingId,compIdx:a.compIdx,name:a.name,size:a.size,type:a.type,by:a.by,ts:a.ts}; });
    state.attachments = m;
    if (openBookingId) refreshBookingModal();
  });
}

function offerSeed(){
  if (!state.user || state.user.role!=='admin') return;
  const have = new Set(state.bookings.map(b=>b.id));
  const missing = SEED_BOOKINGS.filter(sb=>!have.has(sb.fileNo));
  if (!missing.length){ alert('All '+SEED_BOOKINGS.length+' seed bookings are already in the database.'); return; }
  if (confirm('Import '+missing.length+' spreadsheet bookings not yet in the database? Existing bookings are never overwritten.')){
    Promise.all(missing.map(sb=>DB.collection(COLL.bookings).doc(sb.fileNo).set(seedToBooking(sb))))
      .then(()=>logActivity('system','Imported '+missing.length+' seed bookings'));
  }
}

function seedToBooking(sb){
  return {
    id: sb.fileNo,
    fileNo: sb.fileNo,
    source: sb.source,
    sheet: sb.sheet||'',
    contact: sb.contact||'',
    pax: sb.pax||'',
    attachedTrips: sb.attachedTrips||'',
    tripStart: sb.tripStart||'',
    tripEnd: sb.tripEnd||'',
    notes: '',
    comments: [],
    components: (sb.components||[]).map(c=>({
      travelDate: c.travelDate||'', activity: c.activity||'', voucher: c.voucher||'',
      service: c.service||'OTHER', supplier: c.supplier||'', bookingRef: c.bookingRef||'',
      pickupTime: c.pickupTime||'', status: c.status||'Pending',
      remarksKen: c.remarksKen||'', remarksClinton: c.remarksClinton||'',
      quoted: c.quoted||'', estimated: c.estimated||'', paid: c.paid||'',
      sixPoint: c.sixPoint||{operator:'',phone:'',confirmation:'',time:'',location:'',notes:''}
    })),
    updatedAt: new Date().toISOString(), updatedBy: 'seed'
  };
}

function saveBooking(b, action){
  b.updatedAt = new Date().toISOString();
  b.updatedBy = state.user ? state.user.id : '?';
  recalcTripDates(b);
  if (FIRE){ DB.collection(COLL.bookings).doc(b.id).set(b); }
  else {
    const i = state.bookings.findIndex(x=>x.id===b.id);
    if (i>=0) state.bookings[i]=b; else state.bookings.push(b);
    lsSet('bookings', state.bookings);
    renderAll();
  }
  if (action) logActivity(b.fileNo, action);
}

function deleteBooking(id){
  if (FIRE) DB.collection(COLL.bookings).doc(id).delete();
  else { state.bookings = state.bookings.filter(b=>b.id!==id); lsSet('bookings', state.bookings); renderAll(); }
}

function logActivity(ref, action){
  const e = { ts:new Date().toISOString(), user: state.user? state.user.id:'system', ref, action };
  if (FIRE) DB.collection(COLL.activity).add(e);
  else { state.activity.unshift(e); state.activity = state.activity.slice(0,500); lsSet('activity', state.activity); renderActivity(); }
}

function saveListItem(kind, item){
  if (!item.id) item.id = kind.slice(0,2)+Date.now()+Math.random().toString(36).slice(2,5);
  if (FIRE){ DB.collection(COLL[kind]).doc(item.id).set(item); }
  else {
    const i = state[kind].findIndex(x=>x.id===item.id);
    if (i>=0) state[kind][i]=item; else state[kind].push(item);
    lsSet(kind, state[kind]);
    renderListView(kind);
  }
}

/* ================= HELPERS ================= */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){
  if (!iso || !/^\d{4}-\d{2}-\d{2}/.test(iso)) return iso||'—';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function daysTo(iso){
  if (!iso) return null;
  const t = new Date(todayISO()+'T00:00:00'), d = new Date(iso+'T00:00:00');
  return Math.round((d-t)/86400000);
}
function recalcTripDates(b){
  const ds = b.components.filter(c=>/^\d{4}-\d{2}-\d{2}/.test(c.travelDate)).map(c=>c.travelDate).sort();
  if (ds.length){ b.tripStart = ds[0]; b.tripEnd = ds[ds.length-1]; }
}
function tband(b){
  const ds = daysTo(b.tripStart), de = daysTo(b.tripEnd);
  if (ds===null) return {key:'blater', label:'No date', order:9};
  if (de!==null && de < 0) return {key:'bdone', label:'Completed', order:8};
  if (ds <= 0) return {key:'btrav', label:'Travelling', order:0};
  if (ds <= 15) return {key:'b15', label:'T-15', order:1};
  if (ds <= 30) return {key:'b30', label:'T-30', order:2};
  if (ds <= 45) return {key:'b45', label:'T-45', order:3};
  if (ds <= 60) return {key:'b60', label:'T-60', order:4};
  return {key:'blater', label:'60+ days', order:5};
}
function outstandingComps(b){
  return b.components.filter(c=>c.status==='Pending' || c.status==='Issue');
}
function reconfirmedComps(b){
  return b.components.filter(c=>c.status==='Reconfirmed' || c.status==='Confirmed');
}
function activeComps(b){ return b.components.filter(c=>c.status!=='Cancelled'); }
function sixPointComplete(c){
  const s = c.sixPoint||{};
  return !!(s.operator && s.phone && s.confirmation && s.time && s.location);
}

function era(b){ return (b.tripStart||'') >= TAKEOVER_DATE ? 'uk' : 'pre'; }

/* Money parsing — handles "726.67 EUR", "EUR 1.857" (thousands), "USD 264.01",
   "AUD 225", "EUR220 + 100", "6440 EUR total" */
function parseMoney(s){
  if (!s) return null;
  s = String(s).replace(/,/g,'');
  const cm = s.match(/\b(EUR|USD|AUD|GBP|CHF|INR)\b|€|\$|£/i);
  let cur = null;
  if (cm){
    const t = cm[0].toUpperCase();
    cur = t==='€'?'EUR': t==='$'?'USD': t==='£'?'GBP': t;
  }
  const nm = s.match(/(\d+(?:\.\d+)?)/);
  if (!nm) return null;
  let val = parseFloat(nm[1]);
  // European thousands: "1.857" / "1.536" -> 1857 / 1536 (one dot, 3 decimals, small integer part)
  const dm = nm[1].match(/^(\d{1,3})\.(\d{3})$/);
  if (dm && parseInt(dm[1],10) < 100) val = parseInt(dm[1]+dm[2],10);
  return { cur: cur||'EUR', val, guessedCur: !cm };
}
function toEUR(m){
  if (!m) return null;
  const r = state.fx[m.cur];
  return r ? m.val*r : null;
}
/* Variance for a component: paid (or estimated) vs quoted. Negative = saving. */
function compVariance(c){
  const q = parseMoney(c.quoted);
  const p = parseMoney(c.paid) || parseMoney(c.estimated);
  if (!q || !p) return null;
  const qe = toEUR(q), pe = toEUR(p);
  if (qe==null || pe==null) return null;
  return { eur: pe-qe, quotedEUR: qe, paidEUR: pe, approx: q.guessedCur||p.guessedCur };
}
function fmtEUR(v){
  const sign = v<0?'-':'';
  return sign+'€'+Math.abs(v).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function varianceHTML(c){
  if (c.status==='Cancelled') return '<span class="var-chk">—</span>';
  const v = compVariance(c);
  if (!v) return (c.quoted||c.paid||c.estimated) ? '<span class="var-chk">check</span>' : '';
  if (Math.abs(v.eur) < 0.5) return '<span style="color:var(--faint)">±0</span>';
  return v.eur<0
    ? '<span class="var-pos">▼ '+fmtEUR(Math.abs(v.eur))+' saving</span>'
    : '<span class="var-neg">▲ '+fmtEUR(v.eur)+' loss</span>';
}

/* ================= LOGIN ================= */
function doLogin(){
  const u = document.getElementById('loginUser').value.trim().toUpperCase();
  const p = document.getElementById('loginPass').value;
  const users = state.users.length? state.users : (lsGet('users',null)||DEFAULT_USERS);
  const found = users.find(x=>x.id.toUpperCase()===u && x.pass===p);
  if (!found){ document.getElementById('loginErr').textContent = 'Invalid user ID or password.'; return; }
  state.user = found;
  sessionStorage.setItem('ornrecon_user', JSON.stringify({id:found.id}));
  document.getElementById('loginView').style.display='none';
  document.getElementById('appView').style.display='block';
  document.getElementById('userAvatar').textContent = found.id;
  document.getElementById('userName').textContent = found.name;
  logActivity('-', 'Signed in');
  renderAll();
}
function doLogout(){
  sessionStorage.removeItem('ornrecon_user');
  location.reload();
}
function tryRestoreSession(){
  const s = sessionStorage.getItem('ornrecon_user');
  if (!s) return;
  const {id} = JSON.parse(s);
  const users = state.users.length? state.users : (lsGet('users',null)||DEFAULT_USERS);
  const found = users.find(x=>x.id===id);
  if (found){
    state.user = found;
    document.getElementById('loginView').style.display='none';
    document.getElementById('appView').style.display='block';
    document.getElementById('userAvatar').textContent = found.id;
    document.getElementById('userName').textContent = found.name;
  }
}

/* ================= DASHBOARD ================= */
function renderDashboard(){
  const el = document.getElementById('view-dashboard');
  if (!el.classList.contains('active') && el.innerHTML) { /* still refresh counts cheaply */ }
  const bs = state.bookings;
  const bands = {btrav:[],b15:[],b30:[],b45:[],b60:[],blater:[],bdone:[]};
  bs.forEach(b=>{ bands[tband(b).key].push(b); });

  // Outstanding tasks: pending/issue components on upcoming or travelling trips, most urgent first
  const tasks = [];
  bs.forEach(b=>{
    const band = tband(b);
    if (band.key==='bdone') return;
    outstandingComps(b).forEach(c=>tasks.push({b, c, band}));
  });
  tasks.sort((a,z)=> a.band.order - z.band.order || (a.b.tripStart||'').localeCompare(z.b.tripStart||''));

  // Savings / loss totals (non-cancelled comps with parseable variance)
  let saving=0, loss=0, varCount=0, checkCount=0;
  const byMonth = {};
  bs.forEach(b=>{
    activeComps(b).forEach(c=>{
      const v = compVariance(c);
      if (v){
        varCount++;
        if (v.eur<0) saving += -v.eur; else loss += v.eur;
        const mk = (c.travelDate||'').slice(0,7)||'?';
        byMonth[mk] = byMonth[mk]||{saving:0,loss:0};
        if (v.eur<0) byMonth[mk].saving += -v.eur; else byMonth[mk].loss += v.eur;
      } else if (c.quoted || c.paid || c.estimated){ checkCount++; }
    });
  });
  const net = saving - loss;

  // by source
  const srcCount = {};
  bs.forEach(b=>{ srcCount[b.source]=(srcCount[b.source]||0)+1; });

  // service breakdown + popular activities
  const svcCount = {}, actCount = {};
  bs.forEach(b=>activeComps(b).forEach(c=>{
    svcCount[c.service]=(svcCount[c.service]||0)+1;
    const key = normaliseActivity(c.activity);
    if (key) actCount[key]=(actCount[key]||0)+1;
  }));
  const topActs = Object.entries(actCount).sort((a,z)=>z[1]-a[1]).slice(0,8);

  const totalComps = bs.reduce((n,b)=>n+activeComps(b).length,0);
  const pendingComps = bs.reduce((n,b)=>n+outstandingComps(b).length,0);

  el.innerHTML = `
    ${FIRE?'':'<div class="banner">Running in <b>local-device mode</b> — data is saved in this browser only. Paste your ORN Firebase config into the FIREBASE_CONFIG block at the top of this file to enable shared live sync for Ken, Clinton and Ajay.</div>'}
    <div class="flex-between" style="margin-bottom:14px">
      <div><h2 class="vtitle">Operations Dashboard</h2>
      <div class="vsub">UK operation · arrivals from 1 July 2026 · ${bs.length} bookings · ${totalComps} live components · ${pendingComps} awaiting reconfirmation · <a href="#" onclick="switchView('takeover');return false">see takeover comparison →</a></div></div>
      <button class="btn" onclick="openAddBooking()">+ New booking</button>
    </div>

    <div class="tband-row">
      ${bandCard('btrav','Travelling now', bands.btrav)}
      ${bandCard('b15','T-15 · Urgent', bands.b15)}
      ${bandCard('b30','T-30', bands.b30)}
      ${bandCard('b45','T-45', bands.b45)}
      ${bandCard('b60','T-60', bands.b60)}
      ${bandCard('blater','60+ days', bands.blater)}
    </div>

    <div class="grid3" style="margin-bottom:14px">
      <div class="card">
        <h3>Net position (paid vs quoted)</h3>
        <div class="bignum ${net>=0?'saving':'loss'}">${net>=0?'':'-'}€${Math.abs(net).toLocaleString('en-GB',{maximumFractionDigits:0})} ${net>=0?'saved':'lost'}</div>
        <div class="subnum" style="margin-top:6px">▼ €${saving.toLocaleString('en-GB',{maximumFractionDigits:0})} savings &nbsp;·&nbsp; ▲ €${loss.toLocaleString('en-GB',{maximumFractionDigits:0})} losses</div>
        <div class="hint">${varCount} components measured · ${checkCount} need a rate check · FX rates editable in Settings</div>
      </div>
      <div class="card">
        <h3>Bookings by source</h3>
        <div class="chart-wrap"><canvas id="chartSource"></canvas></div>
      </div>
      <div class="card">
        <h3>Components by service</h3>
        <div class="chart-wrap"><canvas id="chartService"></canvas></div>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="flex-between"><h3>Outstanding reconfirmations (${tasks.length})</h3>
        <button class="btn ghost small" onclick="jumpToPending()">View all in Bookings</button></div>
        <div>${tasks.slice(0,14).map(t=>`
          <div class="task-item" onclick="openBooking('${esc(t.b.id)}')">
            <span class="badge ${t.band.key}">${t.band.label}</span>
            <div style="flex:1">
              <div class="ref">${esc(t.b.fileNo)} <span class="pill-src ${esc(t.b.source)}">${esc(t.b.source)}</span></div>
              <div class="meta">${fmtDate(t.c.travelDate)} · ${esc((t.c.activity||'').slice(0,64))} · ${esc(t.c.supplier||'no supplier')}</div>
            </div>
            <span class="chip ${esc(t.c.status)}">${esc(t.c.status)}</span>
          </div>`).join('') || '<div class="empty">Nothing outstanding — all components confirmed.</div>'}
        </div>
      </div>
      <div>
        <div class="card" style="margin-bottom:14px">
          <h3>Savings vs losses by travel month</h3>
          <div class="chart-wrap"><canvas id="chartMonth"></canvas></div>
        </div>
        <div class="card">
          <h3>Most popular activities</h3>
          <div class="stat-list">
            ${topActs.map(([a,n])=>`<div class="row"><span style="cursor:pointer" onclick="filterByActivity('${esc(a)}')">${esc(a)}</span><b>${n}</b></div>`).join('') || '<div class="empty">No data</div>'}
          </div>
        </div>
      </div>
    </div>`;

  drawCharts(srcCount, svcCount, byMonth);
}

function bandCard(key,label,arr){
  const pend = arr.reduce((n,b)=>n+outstandingComps(b).length,0);
  return `<div class="tband ${key}" onclick="filterByBand('${key}')">
    <div class="n">${arr.length}</div><div class="l">${label}</div>
    <div class="d">${pend} component${pend===1?'':'s'} pending</div></div>`;
}

function normaliseActivity(a){
  if (!a) return '';
  a = a.trim();
  const rules = [
    [/eiffel/i,'Eiffel Tower'],[/louvre/i,'Louvre Museum'],[/vatican/i,'Vatican / Sistine Chapel'],
    [/colosseum|commodus/i,'Colosseum'],[/pompei/i,'Pompeii & Vesuvius'],[/gondola/i,'Venice Gondola'],
    [/acropolis/i,'Acropolis'],[/transfer/i,'Transfers'],[/train/i,'Trains'],[/ferry/i,'Ferries'],
    [/hop[- ]on/i,'Hop-on Hop-off'],[/plitvice/i,'Plitvice Lakes'],[/cooking class/i,'Cooking Class'],
    [/walking tour/i,'Walking Tours'],[/cruise/i,'Cruises & Boat Trips'],[/disney/i,'Disneyland Paris']
  ];
  for (const [re,name] of rules) if (re.test(a)) return name;
  return a.length>34 ? a.slice(0,34)+'…' : a;
}

function drawCharts(srcCount, svcCount, byMonth){
  const C = state.charts;
  Object.values(C).forEach(ch=>{try{ch.destroy()}catch(e){}});
  const dark = document.documentElement.getAttribute('data-theme')==='dark';
  const gridCol = dark? 'rgba(139,147,167,.12)':'rgba(95,104,128,.15)';
  Chart.defaults.font.family = "'Plus Jakarta Sans',sans-serif";
  Chart.defaults.color = dark? '#8b93a7':'#5f6880';
  const srcEl = document.getElementById('chartSource');
  if (srcEl) C.src = new Chart(srcEl, {type:'doughnut', data:{
    labels:Object.keys(srcCount),
    datasets:[{data:Object.values(srcCount), backgroundColor:['#0092c8','#4aa845','#c9a94f','#d92d0e'], borderWidth:0}]},
    options:{plugins:{legend:{position:'bottom'}}, cutout:'62%', maintainAspectRatio:false}});
  const svcEl = document.getElementById('chartService');
  if (svcEl) C.svc = new Chart(svcEl, {type:'bar', data:{
    labels:Object.keys(svcCount),
    datasets:[{data:Object.values(svcCount), backgroundColor:'#1d6f9b', borderRadius:5}]},
    options:{plugins:{legend:{display:false}}, scales:{x:{grid:{display:false}},y:{grid:{color:gridCol}}}, maintainAspectRatio:false}});
  const mEl = document.getElementById('chartMonth');
  if (mEl){
    const keys = Object.keys(byMonth).sort();
    C.month = new Chart(mEl, {type:'bar', data:{
      labels:keys.map(k=>{const [y,m]=k.split('-');return new Date(y,m-1,1).toLocaleDateString('en-GB',{month:'short',year:'2-digit'});}),
      datasets:[
        {label:'Savings', data:keys.map(k=>Math.round(byMonth[k].saving)), backgroundColor:'#4fbf6b', borderRadius:4},
        {label:'Losses', data:keys.map(k=>Math.round(byMonth[k].loss)), backgroundColor:'#e6533c', borderRadius:4}
      ]},
      options:{plugins:{legend:{position:'bottom'}}, scales:{x:{grid:{display:false}},y:{grid:{color:gridCol},ticks:{callback:v=>'€'+v}}}, maintainAspectRatio:false}});
  }
}

function toggleComp(i){
  if (openCompSet.has(i)) openCompSet.delete(i); else openCompSet.add(i);
  const b = getBooking(openBookingId);
  const el = document.getElementById('comp'+i);
  if (el) el.classList.toggle('open');
}
function toggleAllComps(){
  const b = getBooking(openBookingId);
  if (openCompSet.size < b.components.length) openCompSet = new Set(b.components.map((_,i)=>i));
  else openCompSet = new Set();
  refreshBookingModal();
}

function editHead(field, val){
  const b = getBooking(openBookingId);
  const old = b[field];
  if (old===val) return;
  b[field]=val;
  if (field==='fileNo'){ /* keep id stable, only display ref changes */ }
  saveBooking(b, `Updated ${field} ("${String(old).slice(0,30)}" → "${String(val).slice(0,30)}")`);
  if (!FIRE) refreshBookingModal();
}
function editComp(i, field, val){
  const b = getBooking(openBookingId);
  const c = b.components[i];
  const old = c[field];
  if (old===val) return;
  c[field]=val;
  const label = c.activity? c.activity.slice(0,36) : 'component '+(i+1);
  saveBooking(b, `${label}: ${field} → "${String(val).slice(0,40)}"`);
  if (!FIRE) refreshBookingModal();
}
function editSix(i, field, val){
  const b = getBooking(openBookingId);
  const c = b.components[i];
  c.sixPoint = c.sixPoint||{operator:'',phone:'',confirmation:'',time:'',location:'',notes:''};
  if (c.sixPoint[field]===val) return;
  c.sixPoint[field]=val;
  saveBooking(b, `${(c.activity||'component '+(i+1)).slice(0,36)}: 6-point ${field} updated`);
  if (!FIRE) refreshBookingModal();
}
function markReconfirmed(i){
  const b = getBooking(openBookingId);
  const c = b.components[i];
  if (!sixPointComplete(c)) return;
  c.status = 'Reconfirmed';
  saveBooking(b, `Reconfirmed: ${(c.activity||'component '+(i+1)).slice(0,50)}`);
  if (!FIRE) refreshBookingModal();
}
function addComponent(){
  const b = getBooking(openBookingId);
  b.components.push({travelDate:b.tripStart||todayISO(), activity:'', voucher:'No voucher required', service:'TOUR',
    supplier:'', bookingRef:'', pickupTime:'', status:'Pending', remarksKen:'', remarksClinton:'',
    quoted:'', estimated:'', paid:'', sixPoint:{operator:'',phone:'',confirmation:'',time:'',location:'',notes:''}});
  openCompSet.add(b.components.length-1);
  saveBooking(b, 'Added a new component');
  if (!FIRE) refreshBookingModal(); else setTimeout(refreshBookingModal, 50);
}
function removeComponent(i){
  const b = getBooking(openBookingId);
  const c = b.components[i];
  if (!confirm('Remove component "'+(c.activity||'untitled')+'"? Consider setting status to Cancelled instead to keep the audit trail.')) return;
  b.components.splice(i,1);
  openCompSet.delete(i);
  saveBooking(b, `Removed component: ${(c.activity||'untitled').slice(0,50)}`);
  if (!FIRE) refreshBookingModal();
}
function addComment(){
  const inp = document.getElementById('newComment');
  const text = inp.value.trim();
  if (!text) return;
  const b = getBooking(openBookingId);
  b.comments = b.comments||[];
  b.comments.push({who: state.user.id, ts:new Date().toISOString(), text});
  saveBooking(b, 'Comment: '+text.slice(0,60));
  if (!FIRE) refreshBookingModal();
}
function removeBooking(){
  const b = getBooking(openBookingId);
  if (!confirm('Delete booking '+b.fileNo+' and all its components? This cannot be undone.')) return;
  logActivity(b.fileNo, 'Booking deleted');
  deleteBooking(b.id);
  closeModal();
}

/* ---- attachments (base64, per-file doc, 730 KB cap) ---- */
function pickFile(compIdx){
  const inp = document.createElement('input');
  inp.type='file';
  inp.onchange = ()=>{
    const f = inp.files[0];
    if (!f) return;
    if (f.size > ATTACH_LIMIT){ alert('File is '+Math.round(f.size/1024)+' KB — the limit is 730 KB per attachment. Please compress it or upload a smaller version.'); return; }
    const r = new FileReader();
    r.onload = ()=>{
      const id = 'att'+Date.now()+Math.random().toString(36).slice(2,7);
      const meta = {id, bookingId: openBookingId, compIdx, name:f.name, size:f.size, type:f.type, by:state.user.id, ts:new Date().toISOString()};
      if (FIRE){
        DB.collection(COLL.attachments).doc(id).set({...meta, data: r.result});
      } else {
        state.attachments[id] = {...meta, data:r.result};
        lsSet('attachments', state.attachments);
        refreshBookingModal();
      }
      logActivity(getBooking(openBookingId).fileNo, 'Uploaded attachment: '+f.name);
    };
    r.readAsDataURL(f);
  };
  inp.click();
}
function attRow(a){
  return `<div class="attach-item">
    <span>📎</span><span class="nm">${esc(a.name)}</span>
    <span class="sz">${Math.round(a.size/1024)} KB · ${esc(a.by)} · ${new Date(a.ts).toLocaleDateString('en-GB')}</span>
    <button class="btn ghost small" onclick="downloadAtt('${a.id}')">Open</button>
    <button class="btn danger small" onclick="deleteAtt('${a.id}')">✕</button>
  </div>`;
}
function downloadAtt(id){
  const open = (data, name)=>{
    const a = document.createElement('a'); a.href=data; a.download=name; a.click();
  };
  if (FIRE){
    DB.collection(COLL.attachments).doc(id).get().then(d=>{ if(d.exists) open(d.data().data, d.data().name); });
  } else {
    const a = state.attachments[id];
    if (a && a.data) open(a.data, a.name);
  }
}
function deleteAtt(id){
  if (!confirm('Delete this attachment?')) return;
  if (FIRE) DB.collection(COLL.attachments).doc(id).delete();
  else { delete state.attachments[id]; lsSet('attachments', state.attachments); refreshBookingModal(); }
}

function openAddBooking(){
  openBookingId = null;
  document.getElementById('modalBox').innerHTML = `

function createBooking(){
  const fileNo = document.getElementById('nbFile').value.trim().toUpperCase();
  if (!fileNo){ document.getElementById('nbErr').textContent='File No is required.'; return; }
  if (state.bookings.some(b=>b.id===fileNo)){ document.getElementById('nbErr').textContent='A booking with this File No already exists.'; return; }
  const b = seedToBooking({fileNo, source:document.getElementById('nbSource').value,
    contact:document.getElementById('nbContact').value.trim(),
    pax:document.getElementById('nbPax').value.trim(),
    attachedTrips:document.getElementById('nbAttached').value.trim(),
    tripStart:document.getElementById('nbStart').value, tripEnd:document.getElementById('nbStart').value,
    components:[], sheet:'manual'});
  saveBooking(b, 'Booking created');
  openBooking(fileNo);
}

/* ================= UK TAKEOVER PROGRESS ================= */
function eraStats(bs){
  let comps=0, confirmed=0, pending=0, cancelled=0, issue=0, sixOk=0;
  let saving=0, loss=0, measured=0, unmeasured=0;
  bs.forEach(b=>b.components.forEach(c=>{
    comps++;
    if (c.status==='Confirmed'||c.status==='Reconfirmed') confirmed++;
    else if (c.status==='Cancelled') cancelled++;
    else if (c.status==='Issue') issue++;
    else pending++;
    if (sixPointComplete(c)) sixOk++;
    if (c.status!=='Cancelled'){
      const v = compVariance(c);
      if (v){ measured++; if (v.eur<0) saving+=-v.eur; else loss+=v.eur; }
      else if (c.quoted||c.paid||c.estimated) unmeasured++;
    }
  }));
  return {bookings:bs.length, comps, confirmed, pending, cancelled, issue, sixOk, saving, loss, net:saving-loss, measured, unmeasured,
    confRate: comps? Math.round(confirmed/comps*100):0};
}
function renderTakeover(){
  const el = document.getElementById('view-takeover');
  if (!el) return;
  const pre = state.bookings.filter(b=>era(b)==='pre');
  const uk = state.bookings.filter(b=>era(b)==='uk');

  const months = monthsList();

    const bs = state.bookings.filter(b=>(b.tripStart||'').slice(0,7)===m);
    const st = eraStats(bs);
    return {m, isUK: m>=TAKEOVER_DATE.slice(0,7), ...st};
  });

  const cmp = (label, a, b, fmt, betterHigher)=>{
    const f = fmt || (x=>x);
    let trend = '';
    if (a!==b){
      const improved = betterHigher===undefined ? null : (betterHigher ? b>a : b<a);
      if (improved!==null) trend = improved ? ' <span class="var-pos">improving</span>' : ' <span class="var-neg">worse</span>';
    }
    return `<div class="row"><span>${label}</span><span><b style="color:var(--faint)">${f(a)}</b> → <b>${f(b)}</b>${trend}</span></div>`;
  };

  el.innerHTML = `
    <h2 class="vtitle">UK takeover progress</h2>
    <div class="vsub">Comparing the operation before and after the UK team took over reconfirmations on 1 July 2026. Historic figures reflect the state of the sheet as inherited — many pre-takeover components were never statused or reconfirmed at all, which is the point.</div>

        <div class="bignum" style="color:var(--gold)">${su.bookings}</div><div class="subnum">bookings · ${su.comps} components</div>
        <div class="stat-list" style="margin-top:10px">
          <div class="row"><span>Confirmed / reconfirmed</span><b>${su.confirmed} (${su.confRate}%)</b></div>

        <div class="stat-list" style="margin-top:4px">

        <tbody>${rowsByMonth.map(r=>`<tr>

  if (cEl){

  if (!confirm('Delete this card transaction? Its receipt (if any) will also be removed.')) return;
  const rc = Object.values(state.attachments).find(a=>a.bookingId==='CARD-'+id);
  if (rc) deleteAttSilent(rc.id);
  deleteListItem('cards', id);
  logActivity('-', 'Card transaction deleted');

function deleteAttSilent(id){
  if (FIRE) DB.collection(COLL.attachments).doc(id).delete();
  else { delete state.attachments[id]; lsSet('attachments', state.attachments); }
}
function uploadReceipt(txnId){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*,application/pdf';
  inp.onchange = ()=>{
    const f = inp.files[0];
    if (!f) return;
    if (f.size > ATTACH_LIMIT){ alert('File is '+Math.round(f.size/1024)+' KB — the limit is 730 KB. Please use a smaller photo or compressed PDF.'); return; }
    const r = new FileReader();
    r.onload = ()=>{
      const id = 'att'+Date.now()+Math.random().toString(36).slice(2,7);
      const meta = {id, bookingId:'CARD-'+txnId, compIdx:null, name:f.name, size:f.size, type:f.type, by:state.user.id, ts:new Date().toISOString()};
      if (FIRE) DB.collection(COLL.attachments).doc(id).set({...meta, data:r.result});
      else { state.attachments[id] = {...meta, data:r.result}; lsSet('attachments', state.attachments); renderCards(); }
      logActivity('-', 'Receipt uploaded: '+f.name);
    };
    r.readAsDataURL(f);
  };
  inp.click();
}

          <div class="log-row"><span class="who">${c}</span>
          <span class="what" style="max-width:140px"><input type="number" step="0.0001" value="${state.fx[c]}" ${isAdmin?'':'disabled'} onchange="state.fx['${c}']=parseFloat(this.value)||0;saveFx()"></span>
          <span class="hint" style="align-self:center">1 ${c} = ${state.fx[c]} EUR</span></div>`).join('')}
        <div class="hint">Variance = Paid (or Estimated if unpaid) minus Quoted, converted at these rates. Update monthly to keep the P&amp;L view honest.</div>
        <div class="section-lbl">Data tools</div>
        <button class="btn ghost small" onclick="exportJSON()">Export all data (JSON)</button>
        ${isAdmin && !FIRE? '<button class="btn ghost small" onclick="resetSeed()">Reset to spreadsheet seed</button>':''}
        ${isAdmin && FIRE? '<button class="btn ghost small" onclick="offerSeed()">Import seed to Firebase</button>':''}
        <div class="hint" style="margin-top:8px">${FIRE? 'Connected to Firebase — everyone sees changes live.' : 'Local-device mode. To go live for the whole team: open this file in a text editor, paste your ORN Firebase project config into FIREBASE_CONFIG at the top, re-save, and host on GitHub Pages alongside the Global Product Hub.'}</div>
      </div>
    </div>`;
}
function addUser(){
  const id = document.getElementById('nuId').value.trim().toUpperCase();
  const name = document.getElementById('nuName').value.trim();
  const pass = document.getElementById('nuPass').value;
  const role = document.getElementById('nuRole').value;
  if (!id || !name || !pass){ alert('Initials, name and password are all required.'); return; }
  if (state.users.some(u=>u.id===id)){ alert('That user ID already exists.'); return; }
  state.users.push({id,name,pass,role});
  saveUsers();
  logActivity('-', 'Added user '+id+' ('+name+')');
  renderSettings();
}
function removeUser(i){
  const u = state.users[i];
  if (!confirm('Remove user '+u.name+'?')) return;
  if (FIRE) DB.collection(COLL.users).doc(u.id).delete();
  state.users.splice(i,1);
  saveUsers();
  logActivity('-', 'Removed user '+u.id);
  renderSettings();
}
function exportJSON(){
  const blob = new Blob([JSON.stringify({bookings:state.bookings, activity:state.activity, users:state.users.map(u=>({id:u.id,name:u.name,role:u.role})), fx:state.fx}, null, 1)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ORN_Reconfirmation_Hub_export_'+todayISO()+'.json';
  a.click();
}
function resetSeed(){
  if (!confirm('Replace ALL local data with the original spreadsheet seed? Any edits made in this browser will be lost.')) return;
  state.bookings = SEED_BOOKINGS.map(seedToBooking);
  lsSet('bookings', state.bookings);
  logActivity('-', 'Local data reset to spreadsheet seed');
  renderAll();
}

/* ================= BOOT ================= */
applyTheme();
document.getElementById('loginPass').addEventListener('keydown', e=>{ if (e.key==='Enter') doLogin(); });
initPersistence();
if (!FIRE) tryRestoreSession(); else setTimeout(tryRestoreSession, 600);

</script>
</body>

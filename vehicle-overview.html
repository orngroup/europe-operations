<style>
:root{--red:#C8102E;--navy:#003DA5;--ink:#111827;--ink2:#374151;--ink3:#6B7280;--bg:#F7F8FA;--border:#E5E7EB;--font:'IBM Plex Sans',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100vh;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--ink)}
.nav{position:fixed;top:0;left:0;right:0;height:54px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.nav-mark{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:2px;text-transform:uppercase}
.nav-name{font-size:14px;font-weight:700;color:var(--ink)}
.nav-div{width:1px;height:20px;background:var(--border);flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:7px;font-size:12px;font-weight:600;color:var(--ink3);text-decoration:none;border:1px solid var(--border);background:#fff;cursor:pointer}
.back-btn:hover{border-color:var(--ink);color:var(--ink)}
.nav-right{margin-left:auto;flex-shrink:0}
.nav-user{font-size:12px;font-weight:600;color:var(--ink3);background:var(--bg);padding:5px 10px;border-radius:20px;border:1px solid var(--border)}
.shell{margin-top:54px;height:calc(100vh - 54px);overflow-y:auto;padding:20px;display:grid;grid-template-columns:320px 1fr;gap:16px;align-items:start}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:12px}
.card-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink3);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.veh-reg{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700;color:var(--ink);line-height:1}
.veh-model{font-size:16px;color:var(--ink2);margin-top:4px;margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--bg)}
.info-row:last-child{border-bottom:none}
.info-row strong{color:var(--ink)}
.stage-badge-big{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:700;color:#fff;display:inline-block;margin-top:8px}
/* Timeline */
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:16px}
.tl-dot{width:14px;height:14px;border-radius:50%;background:var(--navy);position:absolute;left:-17px;top:2px;border:2px solid #fff;box-shadow:0 0 0 2px var(--navy)}
.tl-date{font-size:10px;color:var(--ink3);margin-bottom:3px;font-weight:600}
.tl-event{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:2px}
.tl-detail{font-size:11px;color:var(--ink3);line-height:1.4}
.tl-user{font-size:10px;color:var(--navy);font-weight:600;margin-top:3px}
/* Stage progress */
.stage-prog{display:flex;flex-direction:column;gap:4px}
.sp-row{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:6px}
.sp-row.done{background:#f0fdf4}
.sp-row.current{background:#eff6ff;border:1px solid var(--navy)}
.sp-row.pending{opacity:.5}
.sp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sp-name{font-size:11px;font-weight:600;flex:1}
.sp-check{font-size:11px;color:#10b981}

/* ═══════════════════════════════════════════════════════════
   CAPEYE — GLOBAL TYPOGRAPHY & SPACING SYSTEM
   All pages must use these values. Do not override.
   ═══════════════════════════════════════════════════════════ */

/* Page title — the big heading at top of each page */
.page-title, h1.page-title, h1 {
  font-size: 22px !important;
  font-weight: 800 !important;
  color: #111827 !important;
  letter-spacing: -0.3px !important;
  line-height: 1.2 !important;
  margin-bottom: 4px !important;
  display: flex !important;
  align-items: center !important;
  gap: 10px !important;
}
/* Red accent word in titles (e.g. "Key Dashboard", "Stock Analytics") */
h1 .r, h1 span.r, .page-title .r { color: #C8102E !important; font-weight: 800 !important; }

/* Page subtitle */
.page-sub, h1 + p, h1 + div.page-sub {
  font-size: 12px !important;
  color: #6B7280 !important;
  font-weight: 400 !important;
  margin-top: 2px !important;
  margin-bottom: 0 !important;
}

/* Section headings inside cards */
h2, .section-title, .card-title {
  font-size: 13px !important;
  font-weight: 700 !important;
  color: #111827 !important;
}

/* Card header labels (ALL CAPS small) */
.card-h, .card-hdr, [class*="card-h"] {
  font-size: 11px !important;
  font-weight: 700 !important;
  text-transform: uppercase !important;
  letter-spacing: 1px !important;
  color: #6B7280 !important;
}

/* Body text */
body {
  font-size: 13px !important;
  line-height: 1.5 !important;
  color: #374151 !important;
  font-family: 'IBM Plex Sans', sans-serif !important;
}

/* Table headers */
th, .ac-table th, thead th {
  font-size: 11px !important;
  font-weight: 700 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.8px !important;
  color: #6B7280 !important;
}

/* Table body cells */
td, .ac-table td {
  font-size: 12px !important;
  color: #374151 !important;
}

/* KPI values */
.kpi-v, .kpi-value, [class*="kpi-v"] {
  font-size: 28px !important;
  font-weight: 700 !important;
  line-height: 1 !important;
  font-family: 'IBM Plex Mono', monospace !important;
}

/* KPI labels */
.kpi-l, .kpi-label, [class*="kpi-l"] {
  font-size: 10px !important;
  font-weight: 700 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.8px !important;
  color: #6B7280 !important;
  margin-top: 4px !important;
}

/* Buttons — consistent sizing */
.btn, button[class*="btn"], .tb-btn {
  font-size: 12px !important;
  font-weight: 700 !important;
  font-family: 'IBM Plex Sans', sans-serif !important;
}

/* Badges / tags */
.badge, [class*="-badge"], [class*="-tag"] {
  font-size: 10px !important;
  font-weight: 700 !important;
}

/* Form labels */
.form-label, label[class*="form-label"] {
  font-size: 11px !important;
  font-weight: 700 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.8px !important;
  color: #6B7280 !important;
}

/* Form inputs */
input, select, textarea {
  font-size: 13px !important;
  font-family: 'IBM Plex Sans', sans-serif !important;
}

/* Nav links — keep compact */
.nav-link {
  font-size: 11.5px !important;
  font-weight: 600 !important;
}

/* Registration plates — always mono */
[class*="reg"], [class*="-plate"] {
  font-family: 'IBM Plex Mono', monospace !important;
  font-weight: 700 !important;
}

</style>
</head><body>

    </div>
    <span class="nav-import" id="lastImportBadge">—</span>
    <button onclick="if(confirm('Sign out of CapEye?'))doLogout()" style="padding:5px 12px;background:rgba(200,16,46,.08);border:1px solid rgba(200,16,46,.2);border-radius:6px;color:#C8102E;font-size:11px;font-weight:700;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;white-space:nowrap"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    <span class="nav-user" id="nav-user">Keith Hardy</span>
  </div>
</nav>

<div class="shell" id="shell">
  <div id="left-panel"></div>
  <div id="right-panel"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
document.getElementById('nav-user').textContent = getCurrentUser().name;
const params = new URLSearchParams(location.search);
const reg = params.get('reg');
const vehicle = reg ? AC_VEHICLES.find(v=>v.registration===reg) : null;

if (!vehicle) {
  document.getElementById('shell').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--ink3)"><i class="fas fa-car-burst" style="font-size:48px;margin-bottom:16px;display:block"></i><div style="font-size:18px;font-weight:700;margin-bottom:8px">No vehicle selected</div><a href="inventory.html" style="color:var(--red)">Go to Inventory</a></div>`;
} else {
  const stage = AC_WORKFLOW_STAGES.find(s=>s.name===vehicle.workflowStage);
  const stageColor = stage ? stage.color : '#64748b';
  const days = getDaysInStage(vehicle.stageStarted);
  const mot = getMOTDaysLeft(vehicle.mot);

  // LEFT
  document.getElementById('left-panel').innerHTML = `
    <div class="card">
      <div class="veh-reg">${vehicle.registration}</div>
      <div class="veh-model">${vehicle.make} ${vehicle.model}</div>
      <div class="info-row"><span>Variant</span><strong>${vehicle.variant||'—'}</strong></div>
      <div class="info-row"><span>Colour</span><strong>${vehicle.colour}</strong></div>
      <div class="info-row"><span>Mileage</span><strong>${parseInt(vehicle.mileage||0).toLocaleString()} mi</strong></div>
      <div class="info-row"><span>Fuel</span><strong>${vehicle.fuel}</strong></div>
      <div class="info-row"><span>Gearbox</span><strong>${vehicle.gearbox}</strong></div>
      <div class="info-row"><span>MOT Expiry</span><strong style="${mot<=60?'color:#ef4444':mot<=180?'color:#f59e0b':''}">${vehicle.mot||'—'} (${mot} days)</strong></div>
      <div class="info-row"><span>Date In</span><strong>${vehicle.dateIn||'—'}</strong></div>
      <div class="info-row"><span>Days in Stock</span><strong>${vehicle.daysInStock||0} days</strong></div>
      <div class="info-row"><span>Price</span><strong>${vehicle.price?'£'+vehicle.price.toLocaleString():'No Price'}</strong></div>
      ${canSeePurchasePrice()&&vehicle.purchasePrice?`<div class="info-row"><span>Purchase Price</span><strong style="color:var(--ink3)">£${vehicle.purchasePrice.toLocaleString()}</strong></div>`:''}
      <div class="info-row"><span>Status</span><strong>${vehicle.status}</strong></div>
      <div class="info-row"><span>VIN</span><strong style="font-family:'IBM Plex Mono',monospace;font-size:10px">${vehicle.vin||'—'}</strong></div>
      <span class="stage-badge-big" style="background:${stageColor}">${vehicle.workflowStage}</span>
      <div style="font-size:11px;color:var(--ink3);margin-top:6px">In stage: ${days} days${vehicle.urgent?' · <span style="color:var(--red);font-weight:700">URGENT</span>':''}</div>
    </div>
    <div class="card">
      <div class="card-h"><i class="fas fa-stream"></i> Stage Progress</div>
      <div class="stage-prog">
        ${AC_WORKFLOW_STAGES.map(s => {
          const sIdx = AC_WORKFLOW_STAGES.findIndex(x=>x.name===s.name);
          const cIdx = AC_WORKFLOW_STAGES.findIndex(x=>x.name===vehicle.workflowStage);
          const isDone = sIdx < cIdx;
          const isCurrent = sIdx === cIdx;
          const cls = isDone?'done':isCurrent?'current':'pending';
          return `<div class="sp-row ${cls}">
            <div class="sp-dot" style="background:${s.color}"></div>
            <span class="sp-name">${s.name}${s.optional?' <span style="font-size:9px;color:var(--ink3)">(opt)</span>':''}</span>
            ${isDone?'<i class="fas fa-check sp-check"></i>':isCurrent?'<i class="fas fa-arrow-right" style="color:var(--navy);font-size:10px"></i>':''}
          </div>`;
        }).join('')}
      </div>
    </div>`;

  // DEMO timeline events
  const events = [
    {date:'19/02/2026',time:'09:15',event:'Vehicle Received',detail:`Intake completed by Stanslaw Marzec. Notes: Clean, one small dent nearside.`,user:'Stanslaw Marzec'},
    {date:'22/02/2026',time:'14:30',event:'Bodywork Started',detail:`Assigned to Stanslaw. Repair cost estimated: £320.`,user:'Stanslaw Marzec'},
    {date:'24/02/2026',time:'10:00',event:'Mechanical Inspection',detail:`Full AA-style checklist complete. Parts required: air filter, wiper blades.`,user:'David'},
    {date:'01/03/2026',time:'11:45',event:'Valeting Complete',detail:`Before/after photos uploaded. Handed over to Advertising.`,user:'Gorgino Barnes'},
    {date:'02/03/2026',time:'09:00',event:'Advertising — Live Online',detail:`Turntable video, walk-around, photos all complete. Confirmed live by Ismael.`,user:'Mustafa Naama'},
    {date:'05/03/2026',time:'16:00',event:'Stage Skip — Skipped Legal & Docs',detail:`Reason: V5 already confirmed at intake. Signed off by Keith Hardy.`,user:'Keith Hardy'},
  ];

  document.getElementById('right-panel').innerHTML = `
    <div class="card">
      <div class="card-h"><i class="fas fa-timeline"></i> Complete Vehicle History</div>
      <div class="timeline">
        ${events.map(e=>`
          <div class="tl-item">
            <div class="tl-dot"></div>
            <div class="tl-date">${e.date} at ${e.time}</div>
            <div class="tl-event">${e.event}</div>
            <div class="tl-detail">${e.detail}</div>
            <div class="tl-user"><i class="fas fa-user"></i> ${e.user}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-h"><i class="fas fa-camera"></i> Photos</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        ${[1,2,3,4,5,6,7,8].map(n=>`<div style="aspect-ratio:4/3;background:var(--bg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink3);flex-direction:column;gap:4px"><i class="fas fa-image" style="font-size:18px"></i>Photo ${n}</div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-h"><i class="fas fa-tools"></i> Repairs & Parts</div>
      <div style="font-size:12px;color:var(--ink3);font-style:italic">No repairs logged yet via Firebase for this demo vehicle. Firebase sync will populate this in live mode.</div>
    </div>`;
}
});
</script>
<script>
// Last import badge
(function(){
  try {
    var ts = Math.max(
      parseInt(localStorage.getItem('ce_last_import_stock')||'0'),
      parseInt(localStorage.getItem('ce_last_import_etrack')||'0')
    );
    var el = document.getElementById('lastImportBadge');
    if (!el) return;
    if (!ts) { el.textContent = 'No import yet'; return; }
    var ago = Math.floor((Date.now()-ts)/3600000);
    el.textContent = ago < 1 ? 'Imported < 1hr ago' : ago < 24 ? 'Imported '+ago+'hr ago' : 'Imported '+Math.floor(ago/24)+'d ago';
    el.className = 'nav-import ' + (ago < 24 ? 'fresh' : 'stale');
  } catch(e) {}
})();
</script>

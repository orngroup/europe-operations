// ── SESSION CHECK ────────────────────────────────────────────
(function() {
  var ts = parseInt(localStorage.getItem('ce_auth_ts') || '0');
  var TTL = 12 * 60 * 60 * 1000; // 12 hours
  if (!ts || (Date.now() - ts) > TTL) {
    // Clear session and redirect to login
    ['ce_user_id','ce_user_name','ce_user_dept','ce_user_email',
     'ce_user_admin','ce_user_price','ce_user_mgr','ce_auth_ts'].forEach(function(k){
      localStorage.removeItem(k);
    });
    window.location.replace('login.html');
  }
})();
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
document.getElementById('nav-user').textContent = getCurrentUser().name;
renderAuctions();

// KPIs
const entered = AC_AUCTION_VEHICLES.filter(v=>v.status==='Entered').length;
const awaiting = AC_AUCTION_VEHICLES.filter(v=>v.status==='Awaiting Drop-off').length;
const sold = AC_AUCTION_VEHICLES.filter(v=>v.status==='Sold at Auction').length;
const totalValue = AC_AUCTION_VEHICLES.filter(v=>v.status!=='Sold at Auction').reduce((a,v)=>a+(v.reservePrice||0),0);
const kpis = [{v:AC_AUCTION_VEHICLES.length,l:'Total Entries',c:'#a855f7'},{v:entered,l:'Entered',c:'#6d28d9'},{v:awaiting,l:'Awaiting Drop-off',c:'#f59e0b'},{v:sold,l:'Sold',c:'#10b981'},{v:'£'+totalValue.toLocaleString(),l:'Total Reserve',c:'#3b82f6'}];
document.getElementById('auc-kpis').innerHTML = kpis.map(k=>`<div style="background:#fff;border-radius:10px;padding:12px 16px;border:1px solid var(--border);border-top:3px solid ${k.c}"><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:${k.c}">${k.v}</div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-top:3px">${k.l}</div></div>`).join('');

const statusCls = {Entered:'s-entered','Awaiting Drop-off':'s-awaiting',Preparing:'s-preparing','Sold at Auction':'s-sold'};
document.getElementById('auc-grid').innerHTML = AC_AUCTION_VEHICLES.map(v => `
  <div class="auc-card">
    <div class="auc-hdr">
      <div><div class="auc-reg">${v.registration}</div><div class="auc-model">${v.make} ${v.model} — ${v.variant}</div></div>
      <span class="auc-status ${statusCls[v.status]||'s-entered'}">${v.status}</span>
    </div>
    <div class="auc-meta">
      <span class="auc-tag"><i class="fas fa-palette"></i> ${v.colour}</span>
      <span class="auc-tag"><i class="fas fa-road"></i> ${parseInt(v.mileage||0).toLocaleString()} mi</span>
      <span class="auc-tag"><i class="fas fa-calendar"></i> MOT ${v.mot}</span>
      <span class="auc-tag">${v.condition}</span>
    </div>
    <div class="auc-row"><span>Auction House</span><strong>${v.auctionHouse}</strong></div>
    <div class="auc-row"><span>Auction Date</span><strong>${v.auctionDate} at ${v.auctionTime}</strong></div>
    <div class="auc-row"><span>Lot Number</span><strong>${v.lotNumber}</strong></div>
    <div class="auc-row"><span>Estimated Value</span><strong>£${(v.estimatedValue||0).toLocaleString()}</strong></div>
    <div class="auc-row"><span>Reserve Price</span><strong style="color:var(--red)">£${(v.reservePrice||0).toLocaleString()}</strong></div>
    ${v.soldPrice?`<div class="auc-row"><span>Sold Price</span><strong style="color:#10b981">£${v.soldPrice.toLocaleString()}</strong></div>`:''}
    <div class="auc-row"><span>Assigned To</span><strong>${v.assignedTo}</strong></div>
    ${v.notes?`<div class="auc-reason">"${v.notes}"</div>`:''}
  </div>`).join('');
});
</script>
<script>
// Last import badge
(function(){
  try {
    var ts = Math.max(
      parseInt(localStorage.getItem('ce_last_import_stock')||'0'),
      parseInt(localStorage.getItem('ce_last_import_etrack')||'0')
    );
    var el = document.getElementById('lastImportBadge');
    if (!el) return;
    if (!ts) { el.textContent = 'No import yet'; return; }
    var ago = Math.floor((Date.now()-ts)/3600000);
    el.textContent = ago < 1 ? 'Imported < 1hr ago' : ago < 24 ? 'Imported '+ago+'hr ago' : 'Imported '+Math.floor(ago/24)+'d ago';
    el.className = 'nav-import ' + (ago < 24 ? 'fresh' : 'stale');
  } catch(e) {}
})();
</script>

function updateBell() {
  var count = getUnreadCount();
  var badge = document.getElementById('bellBadge');
  if (!badge) return;
  if (count > 0) {
    badge.style.display = 'flex';
    badge.textContent = count > 9 ? '9+' : count;
  } else {
    badge.style.display = 'none';
  }
}

function openNotifPanel() {
  document.getElementById('notifPanel').classList.add('open');
  document.getElementById('notifOverlay').classList.add('open');
  renderNotifPanel();
  markAllRead();
  setTimeout(updateBell, 300);
}

function closeNotifPanel() {
  document.getElementById('notifPanel').classList.remove('open');
  document.getElementById('notifOverlay').classList.remove('open');
}

function renderNotifPanel() {
  var notifs = getMyNotifications();
  var list = document.getElementById('notifList');
  if (!notifs.length) {
    list.innerHTML = '<div class="notif-empty"><i class="fas fa-bell-slash"></i>No notifications yet</div>';
    return;
  }
  list.innerHTML = notifs.slice(0, 30).map(function(n) {
    var ago = timeAgo(n.ts);
    var typeLabel = { handover:'Handover', urgent:'Urgent', skip:'Skipped', sendback:'Sent Back', fault:'Fault' }[n.type] || n.type;
    return '<div class="notif-item' + (n.read ? '' : ' unread') + '" onclick="window.location.href=\'' + (n.link||'workflow.html') + '\'">' +
      '<div class="notif-item-hdr">' +
      '<span class="notif-reg">' + n.reg + '</span>' +
      '<span class="notif-type ' + n.type + '">' + typeLabel + '</span>' +
      '</div>' +
      '<div class="notif-body">' + n.vehicle + ' — ' + n.stage + (n.fromName ? ' · from ' + n.fromName : '') + '</div>' +
      (n.note ? '<div class="notif-meta">"' + n.note.slice(0,60) + (n.note.length>60?'…':'') + '"</div>' : '') +
      '<div class="notif-meta">' + ago + '</div>' +
      '</div>';
  }).join('');
}

function timeAgo(ts) {
  var diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'hr ago';
  return Math.floor(diff/86400) + 'd ago';
}

// Poll for new notifications every 60s
setInterval(updateBell, 60000);
document.addEventListener('DOMContentLoaded', function() { setTimeout(updateBell, 1000); });

/* ── AUCTION FULL CRUD ── */
const AUC_KEY = 'ce_auction_entries';
function loadAuctions() {
  var local = [];
  try { local = JSON.parse(localStorage.getItem(AUC_KEY) || '[]'); } catch(e) {}
  // Load from Firestore
  if (typeof FS !== 'undefined' && FS) {
    FS.collection('auction').orderBy('updatedAt','desc').get()
      .then(function(snap) {
        var fsEntries = [];
        snap.forEach(function(doc) { fsEntries.push(Object.assign({_id:doc.id},doc.data())); });
        if (fsEntries.length >= local.length) {
          localStorage.setItem(AUC_KEY, JSON.stringify(fsEntries));
          renderAuctions(fsEntries);
        }
      }).catch(function(){});
  }
  return local;
}
function storeAuctions(data) {
  localStorage.setItem(AUC_KEY, JSON.stringify(data));
  if (typeof FS !== 'undefined' && FS) {
    data.forEach(function(e) {
      var id = e._id || ('auc_'+e.reg+'_'+Date.now());
      FS.collection('auction').doc(id).set(e).catch(function(){});
    });
  }
}

var editingAucIdx = -1;

function openAddAuction() {
  editingAucIdx = -1;
  document.getElementById('aucModalTitle').textContent = 'Add Auction Entry';
  ['aucReg','aucMake','aucModel','aucHouse','aucLot','aucDate','aucReserve','aucSalePrice','aucNotes'].forEach(function(id){
    document.getElementById(id).value = '';
  });
  document.getElementById('aucStatus').value = 'Pending';
  document.getElementById('auc-modal').style.display = 'flex';
}

function editAuction(idx) {
  var entries = loadAuctions();
  var e = entries[idx];
  editingAucIdx = idx;
  document.getElementById('aucModalTitle').textContent = 'Edit Entry';
  document.getElementById('aucReg').value = e.reg||'';
  document.getElementById('aucMake').value = e.make||'';
  document.getElementById('aucModel').value = e.model||'';
  document.getElementById('aucHouse').value = e.house||'';
  document.getElementById('aucLot').value = e.lotNo||'';
  document.getElementById('aucDate').value = e.date||'';
  document.getElementById('aucReserve').value = e.reserve||'';
  document.getElementById('aucSalePrice').value = e.salePrice||'';
  document.getElementById('aucStatus').value = e.status||'Pending';
  document.getElementById('aucNotes').value = e.notes||'';
  document.getElementById('auc-modal').style.display = 'flex';
}

function saveAuction() {
  var reg = (document.getElementById('aucReg').value||'').trim().toUpperCase();
  if (!reg) { showToast('Registration is required','error'); return; }
  var v = AC_VEHICLES.find(function(x){ return x.registration===reg; }) || {};
  var entry = {
    reg: reg,
    make: document.getElementById('aucMake').value || v.make || '',
    model: document.getElementById('aucModel').value || v.model || '',
    house: document.getElementById('aucHouse').value,
    lotNo: document.getElementById('aucLot').value,
    date: document.getElementById('aucDate').value,
    reserve: document.getElementById('aucReserve').value,
    salePrice: document.getElementById('aucSalePrice').value,
    status: document.getElementById('aucStatus').value,
    notes: document.getElementById('aucNotes').value,
    updatedAt: new Date().toISOString(),
    updatedBy: getCurrentUser().name,
  };
  var entries = loadAuctions();
  if (editingAucIdx >= 0) { entries[editingAucIdx] = Object.assign(entries[editingAucIdx],entry); }
  else { entries.unshift(entry); }
  storeAuctions(entries);
  document.getElementById('auc-modal').style.display = 'none';
  renderAuctions(entries);
  showToast(editingAucIdx>=0?'Entry updated':'Entry added','success');
}

function deleteAuction(idx) {
  if (!confirm('Delete this auction entry?')) return;
  var entries = loadAuctions();
  entries.splice(idx,1);
  storeAuctions(entries);
  renderAuctions(entries);
  showToast('Entry deleted','success');
}

function closeAucModal() {
  document.getElementById('auc-modal').style.display = 'none';
}

function renderAuctions(entries) {
  if (!entries) entries = loadAuctions();
  var grid = document.getElementById('auc-grid');
  if (!grid) return;
  var statusColors = {Entered:'#7c3aed','Reserve Met':'#1a7f37',Sold:'#003DA5','No Sale':'#C8102E',Pending:'#d4980a'};
  if (!entries.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--ink3)"><i class="fas fa-gavel" style="font-size:28px;opacity:.2;display:block;margin-bottom:10px"></i>No auction entries yet — click Add Entry to get started</div>';
    return;
  }
  grid.innerHTML = entries.map(function(e,i) {
    var col = statusColors[e.status] || '#7a8fa6';
    return '<div style="background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden">' +
      '<div style="background:'+col+'15;border-left:4px solid '+col+';padding:12px 16px">' +
      '<div style="font-family:IBM Plex Mono,monospace;font-size:13px;font-weight:700;background:#f5c518;color:#000;padding:1px 8px;border-radius:4px;display:inline-block;margin-bottom:4px">'+e.reg+'</div>' +
      '<div style="font-size:12px;font-weight:600">'+e.make+' '+e.model+'</div></div>' +
      '<div style="padding:12px 16px">' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:11px;margin-bottom:8px">' +
      '<div><b>House:</b> '+(e.house||'—')+'</div><div><b>Date:</b> '+(e.date||'—')+'</div>' +
      '<div><b>Reserve:</b> '+(e.reserve?'£'+Number(e.reserve).toLocaleString():'—')+'</div>' +
      '<div><b>Sale Price:</b> '+(e.salePrice?'£'+Number(e.salePrice).toLocaleString():'—')+'</div>' +
      '<div style="grid-column:1/-1"><span style="background:'+col+'20;color:'+col+';padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700">'+e.status+'</span></div></div>' +
      (e.notes?'<div style="font-size:11px;color:var(--ink3);margin-bottom:8px">'+e.notes+'</div>':'') +
      '<div style="display:flex;gap:6px">' +
      '<button onclick="editAuction('+i+')" style="flex:1;padding:5px;border:1px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer;background:#fff">Edit</button>' +
      '<button onclick="deleteAuction('+i+')" style="padding:5px 10px;border:1px solid #fecaca;border-radius:6px;font-size:11px;cursor:pointer;background:#fff;color:#C8102E">Delete</button>' +
      '</div></div></div>';
  }).join('');
}
</script>

<div id="auc-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center" onclick="if(event.target===this)closeAucModal()">
  <div style="background:#fff;border-radius:14px;padding:24px;width:90%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="font-size:16px;font-weight:800;color:var(--ink);margin-bottom:16px" id="aucModalTitle">Add Auction Entry</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div style="grid-column:1/-1"><label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);display:block;margin-bottom:4px">Registration *</label><input id="aucReg" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;text-transform:uppercase"></div>
      <div><label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);display:block;margin-bottom:4px">Make</label><input id="aucMake" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px"></div>
      <div><label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);display:block;margin-bottom:4px">Model</label><input id="aucModel" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px"></div>
      <div><label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);display:block;margin-bottom:4px">Auction House</label><input id="aucHouse" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px" placeholder="e.g. BCA Enfield"></div>
      <div><label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);display:block;margin-bottom:4px">Lot Number</label><input id="aucLot" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px"></div>
      <div><label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);display:block;margin-bottom:4px">Auction Date</label><input type="date" id="aucDate" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px"></div>
      <div><label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);display:block;margin-bottom:4px">Status</label><select id="aucStatus" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px"><option>Pending</option><option>Entered</option><option>Reserve Met</option><option>Sold</option><option>No Sale</option></select></div>
      <div><label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);display:block;margin-bottom:4px">Reserve (£)</label><input type="number" id="aucReserve" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px"></div>
      <div><label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);display:block;margin-bottom:4px">Sale Price (£)</label><input type="number" id="aucSalePrice" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px"></div>
      <div style="grid-column:1/-1"><label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);display:block;margin-bottom:4px">Notes</label><textarea id="aucNotes" rows="2" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;resize:vertical"></textarea></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
      <button onclick="closeAucModal()" style="padding:8px 16px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;background:#fff">Cancel</button>
      <button onclick="saveAuction()" style="padding:8px 20px;border:none;border-radius:7px;background:#C8102E;color:#fff;font-size:12px;font-weight:700;cursor:pointer">Save Entry</button>
    </div>
  </div>
</div>
</body>

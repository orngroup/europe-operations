(function() {
  var ts = parseInt(localStorage.getItem('ce_auth_ts') || '0');

  if (!ts || (Date.now() - ts) > TTL) {
    // Clear session and redirect to login
    ['ce_user_id','ce_user_name','ce_user_dept','ce_user_email',
     'ce_user_admin','ce_user_price','ce_user_mgr','ce_auth_ts'].forEach(function(k){

    });

})();

<script>

document.getElementById('nav-user').textContent = getCurrentUser().name;

const ALERT_TYPES = [
  {id:'all',label:'All',color:'#64748b',icon:'fas fa-bell'},
  {id:'overdue',label:'Overdue',color:'#ef4444',icon:'fas fa-clock'},
  {id:'mot',label:'MOT',color:'#f59e0b',icon:'fas fa-calendar-xmark'},
  {id:'no-price',label:'No Price',color:'#f97316',icon:'fas fa-tag'},
  {id:'not-advertised',label:'Not Advertised',color:'#8b5cf6',icon:'fas fa-ad'},
  {id:'urgent',label:'Urgent',color:'#C8102E',icon:'fas fa-fire'},
  {id:'off-site',label:'Off-Site',color:'#3b82f6',icon:'fas fa-truck'},
  {id:'activity',label:'Today Activity',color:'#10b981',icon:'fas fa-check'},
];

let allAlerts = [];

function buildAlerts() {
  allAlerts = [];
  AC_VEHICLES.forEach(v => {
    const days = getDaysInStage(v.stageStarted);
    if (isOverdue(v)) allAlerts.push({type:'overdue',reg:v.registration,title:`${v.registration} — Overdue in ${v.workflowStage}`,desc:`${days} days in stage. Auto-escalated to Keith Hardy.`,color:'#ef4444',icon:'fas fa-clock',link:`vehicle-overview.html?reg=${v.registration}`});
    if (v.urgent) allAlerts.push({type:'urgent',reg:v.registration,title:`${v.registration} — URGENT`,desc:`${v.make} ${v.model} flagged as urgent`,color:'#C8102E',icon:'fas fa-fire',link:`vehicle-overview.html?reg=${v.registration}`});
    const mot = getMOTDaysLeft(v.mot);
    if (mot <= 180 && mot > 0 && v.status !== 'Sold') allAlerts.push({type:'mot',reg:v.registration,title:`${v.registration} — MOT expires in ${mot} days`,desc:`${v.make} ${v.model} · MOT: ${v.mot}. Sorted by soonest date.`,color:mot<=60?'#ef4444':'#f59e0b',icon:'fas fa-calendar-xmark',link:`vehicle-overview.html?reg=${v.registration}`});
    if ((!v.price||v.price===0) && v.status==='In Stock') allAlerts.push({type:'no-price',reg:v.registration,title:`${v.registration} — No Price Set`,desc:`${v.make} ${v.model} is In Stock with no retail price.`,color:'#f97316',icon:'fas fa-tag',link:`inventory.html`});
    if (v.workflowStage==='Ready for Sale' && !v.advertised) allAlerts.push({type:'not-advertised',reg:v.registration,title:`${v.registration} — Ready but Not Advertised`,desc:`${v.make} ${v.model} is Ready for Sale but not yet live online.`,color:'#8b5cf6',icon:'fas fa-ad',link:`workflow.html`});
    if (v.status==='Off-site') allAlerts.push({type:'off-site',reg:v.registration,title:`${v.registration} — Off-site`,desc:`${v.make} ${v.model} is currently off-site. Days away: ${days}.`,color:'#3b82f6',icon:'fas fa-truck',link:`vehicle-overview.html?reg=${v.registration}`});
  });

  // MOT sorted by soonest
  const motAlerts = allAlerts.filter(a=>a.type==='mot');
  motAlerts.sort((a,b)=>getMOTDaysLeft(AC_VEHICLES.find(v=>v.registration===a.reg)?.mot||'') - getMOTDaysLeft(AC_VEHICLES.find(v=>v.registration===b.reg)?.mot||''));

  renderTabs();
  renderAlerts('all');
}

let activeType = 'all';
function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = ALERT_TYPES.map(t => {
    const count = t.id==='all' ? allAlerts.length : allAlerts.filter(a=>a.type===t.id).length;
    return `<button class="tab-btn${activeType===t.id?' active':''}" onclick="renderAlerts('${t.id}')" style="${activeType===t.id?'background:'+t.color+';border-color:'+t.color:''}">
      <i class="${t.icon}"></i>${t.label}<span class="tab-count">${count}</span>
    </button>`;
  }).join('');
}

function renderAlerts(type) {
  activeType = type;
  renderTabs();
  const filtered = type==='all' ? allAlerts : allAlerts.filter(a=>a.type===type);
  const el = document.getElementById('alert-list');
  if (!filtered.length) { el.innerHTML = `<div style="text-align:center;padding:40px;color:var(--ink3)"><i class="fas fa-check-circle" style="font-size:32px;color:#10b981;margin-bottom:8px;display:block"></i>No ${type==='all'?'':type} alerts</div>`; return; }
  el.innerHTML = filtered.map(a=>`
    <div class="alert-card" onclick="location.href='${a.link||'#'}'">
      <div class="alert-icon" style="background:${a.color}20"><i class="${a.icon}" style="color:${a.color}"></i></div>
      <div class="alert-content">
        <div class="alert-title">${a.title}</div>
        <div class="alert-desc">${a.desc}</div>
        <div class="alert-meta"><span class="alert-tag" style="background:${a.color}20;color:${a.color}">${a.type.replace('-',' ').toUpperCase()}</span></div>
      </div>
      <i class="fas fa-chevron-right" style="color:var(--ink3);margin-top:2px;flex-shrink:0"></i>
    </div>`).join('');
}

document.addEventListener("DOMContentLoaded", function() {
buildAlerts();
});

</script>

<div class="notif-overlay" id="notifOverlay" onclick="closeNotifPanel()"></div>
<div class="notif-panel" id="notifPanel">
  <div class="notif-hdr">
    <span class="notif-title"><i class="fas fa-bell"></i> Notifications</span>
    <button onclick="markAllRead();renderNotifPanel()" style="background:none;border:none;font-size:11px;color:var(--ink3);cursor:pointer;font-family:inherit;font-weight:600">Mark all read</button>
    <button onclick="closeNotifPanel()" style="background:none;border:none;font-size:16px;cursor:pointer;color:var(--ink3);padding:2px 6px">&times;</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>
<script>
// ── NAV BELL ──────────────────────────────────────────────────────
function updateBell() {
  var count = getUnreadCount();
  var badge = document.getElementById('bellBadge');
  if (!badge) return;
  if (count > 0) {
    badge.style.display = 'flex';
    badge.textContent = count > 9 ? '9+' : count;
  } else {
    badge.style.display = 'none';
  }
}

function openNotifPanel() {
  document.getElementById('notifPanel').classList.add('open');
  document.getElementById('notifOverlay').classList.add('open');
  renderNotifPanel();
  markAllRead();
  setTimeout(updateBell, 300);
}

function closeNotifPanel() {
  document.getElementById('notifPanel').classList.remove('open');
  document.getElementById('notifOverlay').classList.remove('open');
}

function renderNotifPanel() {
  var notifs = getMyNotifications();
  var list = document.getElementById('notifList');
  if (!notifs.length) {
    list.innerHTML = '<div class="notif-empty"><i class="fas fa-bell-slash"></i>No notifications yet</div>';
    return;
  }
  list.innerHTML = notifs.slice(0, 30).map(function(n) {
    var ago = timeAgo(n.ts);
    var typeLabel = { handover:'Handover', urgent:'Urgent', skip:'Skipped', sendback:'Sent Back', fault:'Fault' }[n.type] || n.type;
    return '<div class="notif-item' + (n.read ? '' : ' unread') + '" onclick="window.location.href=\'' + (n.link||'workflow.html') + '\'">' +
      '<div class="notif-item-hdr">' +
      '<span class="notif-reg">' + n.reg + '</span>' +
      '<span class="notif-type ' + n.type + '">' + typeLabel + '</span>' +
      '</div>' +
      '<div class="notif-body">' + n.vehicle + ' — ' + n.stage + (n.fromName ? ' · from ' + n.fromName : '') + '</div>' +
      (n.note ? '<div class="notif-meta">"' + n.note.slice(0,60) + (n.note.length>60?'…':'') + '"</div>' : '') +
      '<div class="notif-meta">' + ago + '</div>' +
      '</div>';
  }).join('');
}

function timeAgo(ts) {
  var diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'hr ago';
  return Math.floor(diff/86400) + 'd ago';
}

// Poll for new notifications every 60s
setInterval(updateBell, 60000);
document.addEventListener('DOMContentLoaded', function() { setTimeout(updateBell, 1000); });
</script>
</body>
</html>

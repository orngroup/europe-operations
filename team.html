// ── SESSION CHECK ────────────────────────────────────────────
(function() {
  var ts = parseInt(localStorage.getItem('ce_auth_ts') || '0');
  var TTL = 12 * 60 * 60 * 1000; // 12 hours
  if (!ts || (Date.now() - ts) > TTL) {
    // Clear session and redirect to login
    ['ce_user_id','ce_user_name','ce_user_dept','ce_user_email',
     'ce_user_admin','ce_user_price','ce_user_mgr','ce_auth_ts'].forEach(function(k){
      localStorage.removeItem(k);
    });
    window.location.replace('login.html');
  }
})();
</script>

<div class="modal-overlay" id="profileModal" style="display:none" onclick="if(event.target===this)closeProfile()">
  <div class="modal" id="profileContent"></div>
</div>

<script>
/* ── TEAM PAGE ── */
const DEPT_COLORS={Management:'#64748b',Sales:'#003DA5',Workshop:'#ef4444',Valeting:'#10b981',Marketing:'#8b5cf6',Finance:'#a855f7',Bodyshop:'#f97316',Intake:'#6366f1'};
let activeDept='all';

function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function avatarColor(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))&0xffffffff;const cols=['#003DA5','#C8102E','#1a7f37','#d4980a','#7c3aed','#0891b2','#be185d','#d4600a'];return cols[Math.abs(h)%cols.length];}

function renderTeam(){
  const q=(document.getElementById('teamSearch').value||'').toLowerCase();
  const list=AC_STAFF.filter(s=>{
    if(activeDept!=='all'&&s.dept!==activeDept)return false;
    if(q&&!`${s.name} ${s.role} ${s.dept}`.toLowerCase().includes(q))return false;
    return true;
  });
  const grid=document.getElementById('teamGrid');
  if(!list.length){grid.innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)"><i class="fas fa-users" style="font-size:32px;opacity:.2;display:block;margin-bottom:12px"></i>No staff found</div>';return;}
  grid.innerHTML=list.map(s=>{
    const col=DEPT_COLORS[s.dept]||'#003DA5';
    const deptData=AC_DEPARTMENTS.find(d=>d.name===s.dept)||{icon:'👤'};
    const tasks=typeof getTasksForStaff==='function'?getTasksForStaff(s.name):[];
    const pending=tasks.filter(t=>!t.done).length;
    return `<div class="team-card" onclick="openProfile('${s.name.replace(/'/g,"\'")}')">
      <div class="card-banner" style="background:linear-gradient(135deg,${col}22,${col}44)">
        <div class="card-avatar" style="background:${col}"><span style="color:#fff;font-size:22px;font-weight:800">${initials(s.name)}</span></div>
      </div>
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="card-role">${s.role}</div>
        <div class="dept-badge" style="background:${col}18;color:${col};margin-bottom:12px;display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700">${deptData.icon} ${s.dept}</div>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-val" style="color:${col}">${pending}</div><div class="stat-label">Tasks</div></div>
          <div class="stat-box"><div class="stat-val" style="font-size:13px">${s.dept}</div><div class="stat-label">Dept</div></div>
          <div class="stat-box"><div class="stat-val" style="font-size:12px;padding-top:3px">${s.role.split(' ').slice(0,2).join(' ')}</div><div class="stat-label">Title</div></div>
        </div>
        ${s.phone ? `<a href="tel:${s.phone}" style="display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;font-weight:600;color:${col};text-decoration:none"><i class="fas fa-phone" style="font-size:10px"></i>${s.phone}</a>` : '<div style="font-size:10px;color:var(--muted);margin-top:8px">No contact number yet</div>'}
      </div>
    </div>`;
  }).join('');
}

function openProfile(name){
  const s=AC_STAFF.find(x=>x.name===name);if(!s)return;
  const col=DEPT_COLORS[s.dept]||'#003DA5';
  const deptData=AC_DEPARTMENTS.find(d=>d.name===s.dept)||{icon:'👤'};
  const tasks=typeof getTasksForStaff==='function'?getTasksForStaff(s.name):[];
  document.getElementById('profileContent').innerHTML=`
    <div class="modal-banner" style="background:linear-gradient(135deg,${col}33,${col}66)">
      <div class="modal-avatar" style="background:${col}"><span style="color:#fff;font-size:34px;font-weight:800">${initials(s.name)}</span></div>
      <button class="modal-close" onclick="closeProfile()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="modal-name">${s.name}</div>
      <div class="modal-role" style="color:var(--muted);margin-bottom:10px">${s.role}</div>
      <div style="display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;background:${col}18;color:${col};margin-bottom:16px">${deptData.icon} ${s.dept}</div>
      <div class="info-grid">
        <div class="info-field"><div class="info-label">Department</div><div class="info-val">${s.dept}</div></div>
        <div class="info-field"><div class="info-label">Role</div><div class="info-val">${s.role}</div></div>
        <div class="info-field"><div class="info-label">Phone</div><div class="info-val">${s.phone||'Not set'}</div></div>
        <div class="info-field"><div class="info-label">Email</div><div class="info-val">${s.email||'Not set'}</div></div>
        <div class="info-field"><div class="info-label">Start Date</div><div class="info-val">${s.startDate||'Not set'}</div></div>
        <div class="info-field"><div class="info-label">Emergency Contact</div><div class="info-val">${s.emergency||'Not set'}</div></div>
      </div>
      ${tasks.length?`<div style="margin-top:20px"><div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Tasks (${tasks.filter(t=>!t.done).length} pending)</div>
      ${tasks.slice(0,8).map(t=>`<div class="task-list-item"><i class="fas ${t.done?'fa-check-circle task-done':'fa-clock task-pending'}"></i><span>${t.stageName||'Task'}${t.stockNo?' — '+t.stockNo:''}</span><span style="margin-left:auto;font-size:11px">${t.priority==='critical'?'🔴':t.priority==='urgent'?'🟡':''}</span></div>`).join('')}</div>`:
      `<div style="margin-top:20px;padding:16px;background:var(--bg3);border-radius:10px;text-align:center;color:var(--muted);font-size:13px"><i class="fas fa-check-circle" style="color:var(--green);margin-right:8px"></i>No active tasks</div>`}
    </div>`;
  document.getElementById('profileModal').style.display='flex';
}
function closeProfile(){document.getElementById('profileModal').style.display='none';}

function buildDeptFilters(){
  const depts=[...new Set(AC_STAFF.map(s=>s.dept))];
  document.getElementById('deptFilters').innerHTML=
    ['all',...depts].map(d=>`<button class="filter-btn${d===activeDept?' active':''}" onclick="setDept('${d}')">${d==='all'?'All Staff':d} <span style="font-size:10px">${d==='all'?AC_STAFF.length:AC_STAFF.filter(s=>s.dept===d).length}</span></button>`).join('');
}
function setDept(d){activeDept=d;buildDeptFilters();renderTeam();}

buildDeptFilters();
renderTeam();
</script>

document.addEventListener('DOMContentLoaded',function(){var b=document.getElementById('userBadge');if(b)b.textContent='AUTO CAPITAL';});

<!-- NOTIFICATION PANEL -->
<div class="notif-overlay" id="notifOverlay" onclick="closeNotifPanel()"></div>
<div class="notif-panel" id="notifPanel">
  <div class="notif-hdr">
    <span class="notif-title"><i class="fas fa-bell"></i> Notifications</span>
    <button onclick="markAllRead();renderNotifPanel()" style="background:none;border:none;font-size:11px;color:var(--ink3);cursor:pointer;font-family:inherit;font-weight:600">Mark all read</button>
    <button onclick="closeNotifPanel()" style="background:none;border:none;font-size:16px;cursor:pointer;color:var(--ink3);padding:2px 6px">&times;</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>
<script>
// ── NAV BELL ──────────────────────────────────────────────────────
function updateBell() {
  var count = getUnreadCount();
  var badge = document.getElementById('bellBadge');
  if (!badge) return;
  if (count > 0) {
    badge.style.display = 'flex';
    badge.textContent = count > 9 ? '9+' : count;
  } else {
    badge.style.display = 'none';
  }
}

function openNotifPanel() {
  document.getElementById('notifPanel').classList.add('open');
  document.getElementById('notifOverlay').classList.add('open');
  renderNotifPanel();
  markAllRead();
  setTimeout(updateBell, 300);
}

function closeNotifPanel() {
  document.getElementById('notifPanel').classList.remove('open');
  document.getElementById('notifOverlay').classList.remove('open');
}

function renderNotifPanel() {
  var notifs = getMyNotifications();
  var list = document.getElementById('notifList');
  if (!notifs.length) {
    list.innerHTML = '<div class="notif-empty"><i class="fas fa-bell-slash"></i>No notifications yet</div>';
    return;
  }
  list.innerHTML = notifs.slice(0, 30).map(function(n) {
    var ago = timeAgo(n.ts);
    var typeLabel = { handover:'Handover', urgent:'Urgent', skip:'Skipped', sendback:'Sent Back', fault:'Fault' }[n.type] || n.type;
    return '<div class="notif-item' + (n.read ? '' : ' unread') + '" onclick="window.location.href=\'' + (n.link||'workflow.html') + '\'">' +
      '<div class="notif-item-hdr">' +
      '<span class="notif-reg">' + n.reg + '</span>' +
      '<span class="notif-type ' + n.type + '">' + typeLabel + '</span>' +
      '</div>' +
      '<div class="notif-body">' + n.vehicle + ' — ' + n.stage + (n.fromName ? ' · from ' + n.fromName : '') + '</div>' +
      (n.note ? '<div class="notif-meta">"' + n.note.slice(0,60) + (n.note.length>60?'…':'') + '"</div>' : '') +
      '<div class="notif-meta">' + ago + '</div>' +
      '</div>';
  }).join('');
}

function timeAgo(ts) {
  var diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'hr ago';
  return Math.floor(diff/86400) + 'd ago';
}

// Poll for new notifications every 60s
setInterval(updateBell, 60000);
document.addEventListener('DOMContentLoaded', function() { setTimeout(updateBell, 1000); });
</script>

// ── SESSION CHECK ────────────────────────────────────────────
(function() {
  var ts = parseInt(localStorage.getItem('ce_auth_ts') || '0');
  var TTL = 12 * 60 * 60 * 1000; // 12 hours
  if (!ts || (Date.now() - ts) > TTL) {
    // Clear session and redirect to login
    ['ce_user_id','ce_user_name','ce_user_dept','ce_user_email',
     'ce_user_admin','ce_user_price','ce_user_mgr','ce_auth_ts'].forEach(function(k){
      localStorage.removeItem(k);
    });
    window.location.replace('login.html');
  }
})();
</script>

    <div style="font-size:13px;color:var(--ink2);margin-bottom:8px">${b.model}</div>
    <div style="font-size:12px;color:var(--ink2);margin-bottom:4px"><strong>Accessories:</strong> ${b.items}</div>
    ${b.supplier?`<div style="font-size:11px;color:var(--ink3);margin-bottom:4px"><i class="fas fa-truck"></i> Supplier: ${b.supplier}</div>`:''}
    <div style="font-size:11px;color:var(--ink3)"><i class="fas fa-calendar"></i> ${b.date} · <i class="fas fa-user"></i> ${b.assignedTo}</div>
  </div>`).join('');

function openBooking() { document.getElementById('booking-modal').classList.add('open'); }
function saveBooking() {
  const customer = document.getElementById('acc-customer').value;
  const reg = document.getElementById('acc-reg').value;
  if (!customer || !reg) { showToast('Customer and registration required','error'); return; }
  showToast(`Booking saved for ${reg} — ${customer}`,'success');
  document.getElementById('booking-modal').classList.remove('open');
}

document.addEventListener("DOMContentLoaded", function() {

});

</script>

<!-- NOTIFICATION PANEL -->
<div class="notif-overlay" id="notifOverlay" onclick="closeNotifPanel()"></div>
<div class="notif-panel" id="notifPanel">
  <div class="notif-hdr">
    <span class="notif-title"><i class="fas fa-bell"></i> Notifications</span>
    <button onclick="markAllRead();renderNotifPanel()" style="background:none;border:none;font-size:11px;color:var(--ink3);cursor:pointer;font-family:inherit;font-weight:600">Mark all read</button>
    <button onclick="closeNotifPanel()" style="background:none;border:none;font-size:16px;cursor:pointer;color:var(--ink3);padding:2px 6px">&times;</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>
<script>
// ── NAV BELL ──────────────────────────────────────────────────────
function updateBell() {
  var count = getUnreadCount();
  var badge = document.getElementById('bellBadge');
  if (!badge) return;
  if (count > 0) {
    badge.style.display = 'flex';
    badge.textContent = count > 9 ? '9+' : count;
  } else {
    badge.style.display = 'none';
  }
}

function openNotifPanel() {
  document.getElementById('notifPanel').classList.add('open');
  document.getElementById('notifOverlay').classList.add('open');
  renderNotifPanel();
  markAllRead();
  setTimeout(updateBell, 300);
}

function closeNotifPanel() {
  document.getElementById('notifPanel').classList.remove('open');
  document.getElementById('notifOverlay').classList.remove('open');
}

function renderNotifPanel() {
  var notifs = getMyNotifications();
  var list = document.getElementById('notifList');
  if (!notifs.length) {
    list.innerHTML = '<div class="notif-empty"><i class="fas fa-bell-slash"></i>No notifications yet</div>';
    return;
  }
  list.innerHTML = notifs.slice(0, 30).map(function(n) {
    var ago = timeAgo(n.ts);
    var typeLabel = { handover:'Handover', urgent:'Urgent', skip:'Skipped', sendback:'Sent Back', fault:'Fault' }[n.type] || n.type;
    return '<div class="notif-item' + (n.read ? '' : ' unread') + '" onclick="window.location.href=\'' + (n.link||'workflow.html') + '\'">' +
      '<div class="notif-item-hdr">' +
      '<span class="notif-reg">' + n.reg + '</span>' +
      '<span class="notif-type ' + n.type + '">' + typeLabel + '</span>' +
      '</div>' +
      '<div class="notif-body">' + n.vehicle + ' — ' + n.stage + (n.fromName ? ' · from ' + n.fromName : '') + '</div>' +
      (n.note ? '<div class="notif-meta">"' + n.note.slice(0,60) + (n.note.length>60?'…':'') + '"</div>' : '') +
      '<div class="notif-meta">' + ago + '</div>' +
      '</div>';
  }).join('');
}

function timeAgo(ts) {
  var diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'hr ago';
  return Math.floor(diff/86400) + 'd ago';
}

// Poll for new notifications every 60s
setInterval(updateBell, 60000);
document.addEventListener('DOMContentLoaded', function() { setTimeout(updateBell, 1000); });
</script>
</body>
